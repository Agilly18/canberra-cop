<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Argus — Canberra common operating picture</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- 5.x needed: the 2026 OpenFreeMap planet tiles use MVT fields 4.x can't parse -->
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<style>
  :root {
    --panel-w: 400px;  /* #timebar's left offset derives from this */
    --bg: #1a1b26; --panel: #24283bee; --fg: #c0caf5; --dim: #565f89;
    --cyan: #7dcfff; --amber: #e0af68; --red: #f7768e; --green: #9ece6a;
  }
  html, body { margin: 0; height: 100%; background: var(--bg);
    font-family: monospace; color: var(--fg); }
  #map { position: absolute; inset: 0; }

  /* time slider — sits along the bottom, clear of the left panel */
  #timebar { position: absolute; z-index: 6; bottom: 12px;
    left: calc(var(--panel-w) + 62px);
    right: 12px; display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; font-size: 12px;
    background: var(--panel); border: 1px solid var(--dim); border-radius: 8px; }
  #timebar.replay { border-color: var(--amber); }
  #tb-live { font-family: monospace; font-size: 11px; cursor: pointer;
    padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    background: var(--green); color: var(--bg); border: none; }
  #timebar.replay #tb-live { background: var(--amber); }
  #tb-track { flex: 1; position: relative; display: flex;
    align-items: center; min-width: 80px; }
  #tb-slider { width: 100%; accent-color: var(--cyan); margin: 0; }
  #timebar.replay #tb-slider { accent-color: var(--amber); }
  #tb-activity { position: absolute; left: 0; right: 0; bottom: -4px;
    height: 4px; border-radius: 2px; pointer-events: none; opacity: 0.9; }
  #tb-ticks { position: absolute; left: 0; right: 0; top: -6px; height: 6px;
    pointer-events: none; }
  .tb-tick { position: absolute; top: 0; width: 3px; height: 6px;
    border-radius: 1px; pointer-events: auto; cursor: pointer; }
  .tb-tick:hover { transform: scaleX(2); }
  #tb-play, #tb-speed, .tb-n { font-family: monospace; font-size: 11px;
    cursor: pointer; padding: 3px 6px; border-radius: 4px;
    background: #1a1b2680; border: 1px solid var(--dim);
    color: var(--cyan); white-space: nowrap; }
  #tb-play:hover, #tb-speed:hover, .tb-n:hover { border-color: var(--cyan); }
  #tb-play.on { background: var(--amber); color: var(--bg);
    border-color: var(--amber); }
  #tb-goto { font-family: monospace; font-size: 11px; background: #1a1b26;
    color: var(--fg); border: 1px solid var(--cyan); border-radius: 4px; }
  @media (max-width: 1100px) { .tb-nudge, #tb-speed { display: none; } }
  #tb-label { color: var(--dim); white-space: nowrap; min-width: 116px;
    text-align: right; cursor: pointer; }
  #timebar.replay #tb-label { color: var(--amber); }
  #tb-coords { color: var(--dim); white-space: nowrap; cursor: copy;
    min-width: 235px; text-align: right; }
  #tb-coords.flash { color: var(--green); }
  @media (max-width: 700px) { #timebar { left: 12px; bottom: 168px; }
    #tb-coords { display: none; } }
  /* keep scale bar + attribution clear of the timebar */
  .maplibregl-ctrl-bottom-right { bottom: 44px; }
  @media (max-width: 700px) { .maplibregl-ctrl-bottom-right { bottom: 205px; } }

  #panel { position: absolute; z-index: 5; top: 12px; left: 12px; width: var(--panel-w);
    max-height: calc(100vh - 24px); overflow-y: auto;
    background: var(--panel); border: 1px solid var(--dim); border-radius: 8px;
    padding: 14px 18px; font-size: 14px; backdrop-filter: blur(4px); }
  #panel h1 { margin: 0 0 2px; font-size: 17px; color: var(--cyan);
    letter-spacing: 1px; }
  #panel .sub { color: var(--dim); margin-bottom: 10px; }
  #panel .sub .beta { color: var(--amber); border: 1px solid var(--amber);
    border-radius: 3px; padding: 0 4px; margin-left: 4px; font-size: 10px;
    letter-spacing: 1px; }
  .row { display: flex; justify-content: space-between; margin: 2px 0; }
  .row .k { color: var(--dim); }
  hr { border: none; border-top: 1px solid var(--dim); margin: 8px 0; }
  label { display: flex; gap: 6px; align-items: center; cursor: pointer;
    margin: 3px 0; user-select: none; }

  #status { display: flex; gap: 6px; align-items: center; margin-top: 8px;
    color: var(--dim); }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  #dot.ok { background: var(--green); } #dot.err { background: var(--red); }

  #stress { cursor: pointer; }
  #stress-bar { height: 4px; background: #ffffff10; border-radius: 2px;
    margin: 3px 0 8px; overflow: hidden; }
  #stress-bar i { display: block; height: 100%; width: 0;
    background: var(--green); border-radius: 2px; transition: width .6s; }
  #stress-parts { display: none; font-size: 12px; margin: -4px 0 8px;
    padding: 4px 8px; border-left: 3px solid var(--dim);
    background: #ffffff08; border-radius: 0 4px 4px 0; }
  #stress-parts.open { display: block; }

  #addr-search { width: 100%; box-sizing: border-box; margin-bottom: 6px;
    background: #1a1b2680; border: 1px solid var(--dim); border-radius: 4px;
    color: var(--fg); font-family: monospace; font-size: 13px; padding: 6px 8px; }
  #addr-search::placeholder { color: var(--dim); }
  #addr-search:focus { outline: none; border-color: var(--cyan); }
  #addr-results { margin-bottom: 4px; }
  #addr-results .sr { padding: 4px 6px; border-radius: 4px; cursor: pointer;
    font-size: 11px; line-height: 1.35; border-bottom: 1px solid #ffffff10; }
  #addr-results .sr:hover { background: #414868; }
  #addr-results .sr-msg { color: var(--dim); font-size: 11px; padding: 2px 6px; }

  #bomwarn { margin-top: 8px; display: none; }
  #bomwarn.has-warn { display: block; }
  #bomwarn .bw { border-left: 3px solid var(--dim); padding: 3px 8px;
    margin: 4px 0; border-radius: 0 4px 4px 0; background: #ffffff08;
    cursor: pointer; }
  #bomwarn .bw:hover { background: #ffffff14; }
  #bomwarn .bw.major { border-left-color: var(--red); }
  #bomwarn .bw.moderate { border-left-color: var(--amber); }
  #bomwarn .bw.minor { border-left-color: var(--cyan); }
  #bomwarn .bw .bt { display: block; }
  #bomwarn .bw .bt::before { content: '▸ '; color: var(--dim); }
  #bomwarn .bw.open .bt::before { content: '▾ '; }
  #bomwarn .bw .bm { color: var(--dim); font-size: 11px; }
  #bomwarn .bd { display: none; margin-top: 6px; font-size: 11px;
    line-height: 1.4; max-height: 240px; overflow-y: auto; }
  #bomwarn .bw.open .bd { display: block; }
  #bomwarn .bd h2 { font-size: 12px; margin: 4px 0; color: var(--fg); }
  #bomwarn .bd p { margin: 4px 0; }
  #bomwarn .bd .p-id, #bomwarn .bd .source, #bomwarn .bd .dt { color: var(--dim); }

  #aclist { max-height: 200px; overflow-y: auto; margin-top: 4px; }
  #newslist { max-height: 190px; overflow-y: auto; margin-top: 4px; }
  #newslist a { display: block; color: var(--fg); text-decoration: none;
    padding: 2px 4px; border-radius: 4px; }
  #newslist a:hover { background: #414868; }
  #newslist .src { color: var(--dim); font-size: 11px; }
  #sitrep-btn { width: 100%; box-sizing: border-box; margin-top: 8px;
    background: #1a1b2680; border: 1px solid var(--dim); border-radius: 4px;
    color: var(--cyan); font-family: monospace; font-size: 12px;
    padding: 5px 8px; cursor: pointer; letter-spacing: 1px; }
  #sitrep-btn:hover { border-color: var(--cyan); }
  #sitrep-btn:disabled { color: var(--dim); cursor: wait; }
  #sitrep-box { display: none; margin-top: 6px; padding: 6px 8px;
    border-left: 3px solid var(--cyan); background: #ffffff08;
    border-radius: 0 4px 4px 0; font-size: 12px; line-height: 1.45; }
  #sitrep-box .sm { color: var(--dim); font-size: 10px; display: block;
    margin-top: 4px; }
  #health { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
    font-size: 10px; color: var(--dim); }
  #health .hs { display: flex; align-items: center; gap: 3px; cursor: default; }
  #health .hs i { width: 7px; height: 7px; border-radius: 50%;
    background: #565f89; display: inline-block; }
  .sec-h { cursor: pointer; user-select: none; }
  .sec-h:hover .k { color: var(--fg); }
  .sec.closed .sec-b { display: none; }

  #pinleg-h { cursor: pointer; user-select: none; }
  #pinleg { display: none; }
  #pinleg.open { display: block; }
  #pinleg .pl { display: flex; align-items: center; gap: 7px;
    font-size: 11px; margin: 1px 0; }
  #pinleg .pl img { width: 18px; height: 18px; }
  #pinleg .plnote { color: var(--dim); font-size: 11px; margin: 3px 0 2px; }

  #stress-spark { opacity: .85; align-self: center; }

  #zone-name, #zone-km { background: #1a1b2680; border: 1px solid var(--dim);
    border-radius: 4px; color: var(--fg); font-family: monospace;
    font-size: 12px; padding: 4px 6px; box-sizing: border-box; }
  #zone-name:focus, #zone-km:focus { outline: none; border-color: var(--cyan); }
  #zone-add, #zone-poly, #rb-btn, #tog-3d, #windy-pop { background: #1a1b2680;
    border: 1px solid var(--dim); border-radius: 4px; color: var(--cyan);
    font-family: monospace; font-size: 12px; padding: 4px 8px;
    cursor: pointer; white-space: nowrap; }
  #zone-add:hover, #zone-poly:hover, #rb-btn:hover, #tog-3d:hover,
  #windy-pop:hover { border-color: var(--cyan); }
  #tog-3d, #windy-pop { padding: 1px 8px; }
  #tog-3d.on { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  #zone-add:disabled, #zone-poly:disabled { color: var(--amber); cursor: crosshair; }
  #rb-btn { width: 100%; box-sizing: border-box; margin-bottom: 6px; }
  #zonelist .zn { cursor: pointer; padding: 2px 4px; border-radius: 4px;
    font-size: 12px; }
  #zonelist .zn:hover { background: #414868; }
  #zonelist .zn-x { color: var(--dim); cursor: pointer; padding: 0 5px; }
  #zonelist .zn-x:hover { color: var(--red); }
  .fe.fe-zone { background: #7dcfff14; }

  #feed-filter { cursor: pointer; color: var(--dim); }
  #feed-filter:hover { color: var(--fg); }
  #feed-filter.sig { color: var(--cyan); }
  #feedlist { max-height: 230px; overflow-y: auto; margin-top: 4px; }
  .fe { display: flex; gap: 7px; padding: 3px 6px; margin: 3px 0;
    border-left: 3px solid var(--dim); border-radius: 0 4px 4px 0;
    background: #ffffff08; cursor: pointer; font-size: 12px; line-height: 1.35; }
  .fe:hover { background: #ffffff14; }
  .fe .fe-m { color: var(--dim); font-size: 11px; }
  .fe .fe-k { font-weight: bold; }
  .fe.fresh { animation: fefresh 1.2s ease-out 4; }
  @keyframes fefresh { 0% { background: #7dcfff44; } 100% { background: #ffffff08; } }
  #aclist .ac { display: grid; grid-template-columns: 70px 46px 1fr;
    gap: 6px; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
  #aclist .ac:hover { background: #414868; }
  #aclist .mil { color: var(--red); }
  .legend { display: flex; gap: 10px; margin-top: 6px; color: var(--dim); }
  .legend b { font-weight: normal; }
  .lo { color: var(--amber); } .hi { color: var(--cyan); } .ml { color: var(--red); }

  .maplibregl-popup-content { background: var(--panel); color: var(--fg);
    font-family: monospace; font-size: 12px; border: 1px solid var(--dim); }
  .maplibregl-popup-tip { border-top-color: var(--panel) !important; }

  /* attribution: dark pill instead of the stock white bar */
  .maplibregl-ctrl-attrib { background: var(--panel) !important;
    color: var(--dim); border-radius: 8px; font-size: 11px; }
  .maplibregl-ctrl-attrib a { color: var(--dim); }
  .maplibregl-ctrl-attrib-button { filter: invert(0.6); }
  .maplibregl-ctrl-scale { background: #1a1b2680; color: var(--dim);
    border-color: var(--dim); font-family: monospace; font-size: 10px; }

  /* phones: the panel becomes a bottom sheet — collapsed peek shows title +
     stress index, tapping the handle (or title) expands it over the map */
  #sheet-handle { display: none; }
  @media (max-width: 700px) {
    #panel { top: auto; left: 8px; right: 8px; bottom: 0; width: auto;
      max-height: 158px; overflow: hidden;
      border-radius: 12px 12px 0 0; border-bottom: none;
      transition: max-height .25s ease; padding-top: 5px; }
    #panel.expanded { max-height: 78vh; overflow-y: auto; }
    #sheet-handle { display: block; width: 44px; height: 4px;
      margin: 0 auto 8px; border-radius: 2px; background: var(--dim);
      cursor: pointer; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <div id="sheet-handle" title="tap to expand"></div>
  <h1>ARGUS</h1>
  <div class="sub">Canberra · all-source · v0.06<span class="beta">BETA</span></div>

  <div class="row" id="stress" title="composite of incidents, fires, outages, warnings, weather — click for breakdown">
    <span class="k">stress index</span>
    <canvas id="stress-spark" width="64" height="14" title="last 24 h"></canvas>
    <span id="stress-val">—</span></div>
  <div id="stress-bar"><i id="stress-fill"></i></div>
  <div id="stress-parts"></div>

  <input id="addr-search" type="text" placeholder="search address…" autocomplete="off">
  <div id="addr-results"></div>
  <button id="rb-btn" title="measure distance and bearing between two points">⤢ range / bearing</button>

  <div class="row"><span class="k">temp / feels</span><span id="wx-temp">—</span></div>
  <div class="row"><span class="k">wind</span><span id="wx-wind">—</span></div>
  <div class="row"><span class="k">conditions</span><span id="wx-cond">—</span></div>
  <div id="bomwarn"></div>
  <button id="sitrep-btn">◆ SITREP</button>
  <div id="sitrep-box"></div>
  <hr>
  <div class="sec" data-sec="layers">
    <div class="row sec-h"><span class="k">layers</span><span class="k sec-a">▾</span></div>
    <div class="sec-b">
      <div class="row" id="basemap" style="gap:8px; justify-content:flex-start; flex-wrap:wrap">
        <span class="k">map</span>
        <label style="margin:0" title="Tokyo-Night vector basemap"><input type="radio" name="base" value="vector" checked> dark+</label>
        <label style="margin:0"><input type="radio" name="base" value="base"> dark</label>
        <label style="margin:0"><input type="radio" name="base" value="base-street"> street</label>
        <label style="margin:0"><input type="radio" name="base" value="base-sat"> satellite</label>
      </div>
      <div class="row" style="gap:8px; justify-content:flex-start">
        <label style="margin:0"><input type="checkbox" id="tog-hillshade"> hillshade</label>
        <button id="tog-3d" title="tilt into 3D terrain (drag with right mouse / two fingers to look around)">◱ 3D</button>
        <button id="windy-pop" title="open windy.com at this view">windy ↗</button>
      </div>
      <label><input type="checkbox" id="tog-ac" checked> aircraft <span id="ac-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-trails" checked> trails</label>
      <label><input type="checkbox" id="tog-radar" checked> rain radar</label>
      <label><input type="checkbox" id="tog-wind"> wind field</label>
      <label title="animated particle flow from live wind data"><input type="checkbox" id="tog-flow"> wind flow</label>
      <label><input type="checkbox" id="tog-suburbs" checked> suburb boundaries</label>
      <label><input type="checkbox" id="tog-esa" checked> esa incidents <span id="esa-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-heat"> incident heat (72 h)</label>
      <label><input type="checkbox" id="tog-traffic"> traffic flow <span id="traffic-note" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-fires" checked> fire hotspots <span id="fires-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-rfs" checked> nsw rfs <span id="rfs-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-power" checked> power outages <span id="power-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-transit" checked> transit <span id="transit-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-closures" checked> road closures <span id="closures-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-airq" checked> air quality <span id="airq-count" style="color:var(--dim)"></span></label>
      <label><input type="checkbox" id="tog-quakes" checked> earthquakes <span id="quakes-count" style="color:var(--dim)"></span></label>
      <div class="legend"><b class="lo">▲ &lt;10k ft</b><b class="hi">▲ ≥10k ft</b><b class="ml">▲ military</b></div>
      <div class="row" id="pinleg-h" title="what the incident pin glyphs mean">
        <span class="k">pin legend</span><span class="k" id="pinleg-a">▸</span></div>
      <div id="pinleg"></div>
      <div id="aclist"></div>
    </div>
  </div>
  <hr>
  <div class="sec" data-sec="zones">
    <div class="row sec-h"><span class="k">watch zones</span><span class="k sec-a">▾</span></div>
    <div class="sec-b">
      <div id="zonelist"></div>
      <div class="row" style="gap:6px; margin-top:4px">
        <input id="zone-name" placeholder="name" autocomplete="off" style="flex:1; min-width:0">
        <input id="zone-km" type="number" value="2" min="0.5" step="0.5" title="radius, km" style="width:56px">
        <button id="zone-add">+ place</button>
        <button id="zone-poly" title="draw a polygon zone: click vertices, double-click to close">⬠ poly</button>
      </div>
      <label><input type="checkbox" id="tog-notify"> desktop alerts <span id="notify-note" class="k"></span></label>
      <label><input type="checkbox" id="tog-sound"> alert sounds</label>
    </div>
  </div>
  <hr>
  <div class="sec" data-sec="feed">
    <div class="row sec-h"><span class="k">event feed</span>
      <span><span id="feed-filter" title="significant hides routine ambulance / planned-burn churn">all</span>
      <span id="feed-note" style="color:var(--dim)"></span> <span class="k sec-a">▾</span></span></div>
    <div class="sec-b"><div id="feedlist"></div></div>
  </div>
  <hr>
  <div class="sec" data-sec="news">
    <div class="row sec-h"><span class="k">canberra news</span>
      <span><span id="news-note" style="color:var(--dim)"></span> <span class="k sec-a">▾</span></span></div>
    <div class="sec-b"><div id="newslist"></div></div>
  </div>
  <div id="health"></div>
  <div id="status"><div id="dot"></div><span id="status-text">connecting…</span></div>
</div>

<div id="timebar" class="live">
  <button id="tb-live" title="jump to live">● LIVE</button>
  <button id="tb-play" title="replay forward from here">▶</button>
  <button id="tb-speed" title="playback speed (replay minutes per second)">1m/s</button>
  <span class="tb-nudge">
    <button class="tb-n" data-d="-3600" title="back 1 hour (shift+←)">−1h</button>
    <button class="tb-n" data-d="-300" title="back 5 min (←)">−5m</button>
  </span>
  <div id="tb-track">
    <div id="tb-activity" title="hourly activity — brighter = busier"></div>
    <input id="tb-slider" type="range" min="0" max="1" step="30" value="1" disabled>
    <div id="tb-ticks"></div>
  </div>
  <span class="tb-nudge">
    <button class="tb-n" data-d="300" title="forward 5 min (→)">+5m</button>
    <button class="tb-n" data-d="3600" title="forward 1 hour (shift+→)">+1h</button>
  </span>
  <span id="tb-label" title="click to jump to an exact time">recording…</span>
  <span id="tb-coords" title="cursor position — click to copy">—</span>
</div>

<script>
const CBR = { lat: -35.28, lon: 149.13, radiusNm: 60 };
// Time slider: null = live. When set to an epoch (seconds), incident layers
// pull their state from /history at that moment instead of the live feed.
let REPLAY = null;
const feedURL = s => REPLAY ? `history/${s}?at=${REPLAY}` : s;
const WMO = { 0:'clear', 1:'mostly clear', 2:'partly cloudy', 3:'overcast',
  45:'fog', 48:'rime fog', 51:'drizzle', 53:'drizzle', 55:'drizzle',
  61:'light rain', 63:'rain', 65:'heavy rain', 71:'light snow', 73:'snow',
  75:'heavy snow', 80:'showers', 81:'showers', 82:'heavy showers',
  95:'thunderstorm', 96:'thunderstorm', 99:'thunderstorm' };

const map = new maplibregl.Map({
  container: 'map',
  center: [CBR.lon, CBR.lat],
  zoom: 9,
  attributionControl: false,   // re-added compact below (ⓘ pill, not a bar)
  style: {
    version: 8,
    // needed by any symbol layer with text (transit labels)
    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources: {
      carto: {
        type: 'raster', tileSize: 256,
        tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
        attribution: '© OpenStreetMap © CARTO · aircraft: airplanes.live · wx: Open-Meteo · radar: RainViewer · outages: Evoenergy / Essential Energy · transit: Transport Canberra · air/roads: ACT Gov · quakes: Geoscience Australia'
      },
      osm: {
        type: 'raster', tileSize: 256,
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        attribution: '© OpenStreetMap contributors'
      },
      esri: {
        type: 'raster', tileSize: 256,
        // note {y}/{x} order — ArcGIS tile scheme
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        attribution: 'Imagery © Esri, Maxar, Earthstar Geographics'
      },
      // AWS Open Data terrain (Terrarium-encoded), keyless. Two identical

// --- coordinate readout (lat/lon + MGRS) ------------------------------------
// Self-contained WGS84 → UTM → MGRS conversion (no library). Canberra is
// zone 55H, square FA; digits=4 gives 10 m precision.
function toMGRS(lat, lon, digits = 4) {
  const D2R = Math.PI / 180;
  const a = 6378137, f = 1 / 298.257223563;
  const e2 = f * (2 - f), ep2 = e2 / (1 - e2), k0 = 0.9996;
  const zone = Math.max(1, Math.min(60, Math.floor((lon + 180) / 6) + 1));
  const lat0 = lat * D2R, dLon = (lon - (zone * 6 - 183)) * D2R;
  const sin = Math.sin(lat0), cos = Math.cos(lat0), tan = Math.tan(lat0);
  const N = a / Math.sqrt(1 - e2 * sin * sin);
  const T = tan * tan, C = ep2 * cos * cos, A = cos * dLon;
  const M = a * ((1 - e2 / 4 - 3 * e2 * e2 / 64 - 5 * e2 ** 3 / 256) * lat0
    - (3 * e2 / 8 + 3 * e2 * e2 / 32 + 45 * e2 ** 3 / 1024) * Math.sin(2 * lat0)
    + (15 * e2 * e2 / 256 + 45 * e2 ** 3 / 1024) * Math.sin(4 * lat0)
    - (35 * e2 ** 3 / 3072) * Math.sin(6 * lat0));
  const E = k0 * N * (A + (1 - T + C) * A ** 3 / 6
    + (5 - 18 * T + T * T + 72 * C - 58 * ep2) * A ** 5 / 120) + 500000;
  let Nn = k0 * (M + N * tan * (A * A / 2 + (5 - T + 9 * C + 4 * C * C) * A ** 4 / 24
    + (61 - 58 * T + T * T + 600 * C - 330 * ep2) * A ** 6 / 720));
  if (lat < 0) Nn += 10000000;
  const band = 'CDEFGHJKLMNPQRSTUVWX'[Math.max(0, Math.min(19, Math.floor((lat + 80) / 8)))];
  const col = ['ABCDEFGH', 'JKLMNPQR', 'STUVWXYZ'][(zone - 1) % 3][Math.floor(E / 100000) - 1];
  const row = (zone % 2 ? 'ABCDEFGHJKLMNPQRSTUV'
                        : 'FGHJKLMNPQRSTUVABCDE')[Math.floor(Nn / 100000) % 20];
  const trim = v => String(Math.floor(v % 100000)).padStart(5, '0').slice(0, digits);
  return `${zone}${band} ${col}${row} ${trim(E)} ${trim(Nn)}`;
}

function categorise(title) {
  const t = (title || '').toUpperCase();
  if (/HAZARD REDUCTION|PRESCRIBED|PILE BURN/.test(t)) return 'burn';
  if (/MOTOR VEHICLE|MVA|COLLISION|CRASH|VEHICLE ACCIDENT/.test(t)) return 'crash';
  if (/HAZMAT|CHEMICAL|GAS LEAK|FUEL|SPILL/.test(t)) return 'hazmat';
  if (/RESCUE|TRAPPED|SEARCH/.test(t)) return 'rescue';

// --- watch zones: named circles; events inside get boosted + tagged ---
let zones = JSON.parse(localStorage.getItem('copZones') || '[]');
function circlePoly(lon, lat, km) {
  const pts = [];
  for (let i = 0; i <= 48; i++) {
    const a = i / 48 * 2 * Math.PI;
    pts.push([lon + km / (111.32 * Math.cos(lat * Math.PI / 180)) * Math.cos(a),
      lat + km / 110.57 * Math.sin(a)]);
  }
  return pts;
}
// works for both circle zones and polygon zones (ray-cast test)
function zoneContains(z, lon, lat) {
  if (z.type === 'poly') {
    let inside = false;
    const c = z.coords;
    for (let i = 0, j = c.length - 1; i < c.length; j = i++)
      if ((c[i][1] > lat) !== (c[j][1] > lat) &&
          lon < (c[j][0] - c[i][0]) * (lat - c[i][1]) /
            (c[j][1] - c[i][1]) + c[i][0])
        inside = !inside;
    return inside;
  }
  return kmDist(lat, lon, z.lat, z.lon) <= z.km;
}
function zoneCentre(z) {
  if (z.type !== 'poly') return [z.lon, z.lat];
  const pts = z.coords.slice(0, -1);
  return [pts.reduce((s, p) => s + p[0], 0) / pts.length,
    pts.reduce((s, p) => s + p[1], 0) / pts.length];
}
function zoneOf(lon, lat) {
  const z = zones.find(w => zoneContains(w, lon, lat));
  return z ? z.name : null;
}
function saveZones() {
  localStorage.setItem('copZones', JSON.stringify(zones));
  renderZones();
}
function renderZones() {
  const src = map.getSource('zones');
  if (src) src.setData({ type: 'FeatureCollection', features: zones.flatMap(w => [
    { type: 'Feature', properties: {},
      geometry: { type: 'Polygon', coordinates:
        [w.type === 'poly' ? w.coords : circlePoly(w.lon, w.lat, w.km)] } },
    { type: 'Feature', properties: { name: w.name },
      geometry: { type: 'Point', coordinates: zoneCentre(w) } }
  ]) });
  document.getElementById('zonelist').innerHTML = zones.map((w, i) =>
    `<div class="zn row" data-i="${i}"><span>⌂ ${w.name}

}

// --- geofencing: aircraft enter / dwell alerts per watch zone.
// Enter logs only below 10 000 ft (cruise overflights are noise); dwelling
// ≥3 min alerts once per visit; 60 s exit grace stops boundary flapping.
const geoState = {};
function geofence() {
  if (!zones.length) return;
  const now = Date.now();
  for (const a of state.planes) {
    if (a.alt_baro === 'ground') continue;
    const alt = a.alt_baro || 0;
    for (const z of zones) {
      if (!zoneContains(z, a.lon, a.lat)) continue;
      const key = z.name + '|' + a.hex;
      const st = geoState[key];
      if (!st) {
        geoState[key] = { since: now, lastIn: now, alerted: false };
        if (alt <= 10000) {
          feedEvent('geo', 'geofence', {
            title: `${(a.flight || a.hex).trim()} entered ${z.name}`,
            cat: 'air', lon: a.lon, lat: a.lat,
            detail: alt.toLocaleString() + ' ft' });
          saveFeed();
        }
      } else {
        st.lastIn = now;
        if (!st.alerted && now - st.since > 180e3) {
          st.alerted = true;
          feedEvent('geo', 'geofence', {
            title: `${(a.flight || a.hex).trim()} dwelling in ${z.name}`,
            cat: 'air', lon: a.lon, lat: a.lat,
            detail: Math.round((now - st.since) / 60e3) + ' min inside' });
          saveFeed();
        }
      }
    }
  }
  for (const [k, st] of Object.entries(geoState))
    if (now - st.lastIn > 60e3) delete geoState[k];
}

// --- range & bearing: two clicks → distance + true bearing readout ---
function bearingDeg(lat1, lon1, lat2, lon2) {
  const p1 = lat1 * Math.PI / 180, p2 = lat2 * Math.PI / 180,
    dl = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dl) * Math.cos(p2);
  const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
  return Math.round((Math.atan2(y, x) * 180 / Math.PI + 360) % 360);
}

  loiterSeen: {}

  // In replay the layers show a past snapshot; diffing it against live state

  if (REPLAY) return;
  const prev = feedState.known[src];
  const cur = {};
  items.forEach(i => cur[i.id] = i);
  feedState.known[src] = cur;
  if (!prev) { saveFeed(); return; } // first sight of a source: seed silently

  renderFeed();

      (i.detail || '').includes('Emergency Warning') ||

    .map((e, n) => {

// --- breadcrumb trails: last few minutes of movement per entity ---
const TRANSIT_HIST = {};   // id → { mode, pts: [[lon, lat, t], …] }
function renderTrails() {
  if (!map.getSource('trails')) return;
  const feats = [];
  const seg = (pts, col) => {
    for (let i = 1; i < pts.length; i++)
      feats.push({ type: 'Feature',
        geometry: { type: 'LineString',
          coordinates: [[pts[i - 1][0], pts[i - 1][1]], [pts[i][0], pts[i][1]]] },
        properties: { col, op: 0.55 * i / pts.length } });
  };
  for (const a of state.planes) {
    const h = AIR_HIST[a.hex];
    if (!h || h.length < 2) continue;
    const mil = ((a.dbFlags || 0) & 1) === 1;
    const alt = a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0);
    seg(h, mil ? '#f7768e' : alt < 10000 ? '#e0af68' : '#7dcfff');
  }
  for (const v of Object.values(TRANSIT_HIST))
    if (v.pts.length >= 2)
      seg(v.pts, v.mode === 'lightrail' ? '#bb9af7' : '#9ece6a');
  map.getSource('trails').setData({ type: 'FeatureCollection', features: feats });
}

// --- loiter detection: low aircraft circling tight near an active incident ---
const AIR_HIST = {};
function kmDist(lat1, lon1, lat2, lon2) {
  const R = 6371, dLa = (lat2 - lat1) * Math.PI / 180,
    dLo = (lon2 - lon1) * Math.PI / 180;
  const s = Math.sin(dLa / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function detectLoiter() {
  const now = Date.now() / 1000;
  const seen = new Set();
  for (const a of state.planes) {
    if (a.alt_baro === 'ground') continue;
    seen.add(a.hex);
    (AIR_HIST[a.hex] = AIR_HIST[a.hex] || []).push([a.lon, a.lat, now]);
    if (AIR_HIST[a.hex].length > 15) AIR_HIST[a.hex].shift();
  }
  for (const hex of Object.keys(AIR_HIST)) // forget aircraft gone > 5 min
    if (!seen.has(hex) && now - AIR_HIST[hex].at(-1)[2] > 300) delete AIR_HIST[hex];
  for (const a of state.planes) {
    const h = AIR_HIST[a.hex];
    if (!h || h.length < 10 || now - h[0][2] < 100) continue; // ≥100 s of track
    const alt = a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0);
    if (!alt || alt > 7000) continue;         // low = working, not transiting
    const cLon = h.reduce((s, p) => s + p[0], 0) / h.length;
    const cLat = h.reduce((s, p) => s + p[1], 0) / h.length;
    if (h.some(p => kmDist(p[1], p[0], cLat, cLon) > 2)) continue; // not tight
    let best = null;
    for (const f of state.esaFeats) {
      const d = kmDist(f.geometry.coordinates[1], f.geometry.coordinates[0],
        a.lat, a.lon);
      if (d < 5 && (!best || d < best.d)) best = { f, d };
    }
    if (!best) continue;
    const key = a.hex + '|' + best.f.properties.guid;
    if (feedState.loiterSeen[key] && now - feedState.loiterSeen[key] < 1800)
      continue; // don't re-alert the same pairing for 30 min
    feedState.loiterSeen[key] = now;
    feedEvent('loiter', 'aircraft', {
      title: `${(a.flight || a.hex).trim()} loitering near ${best.f.properties.suburb}`,
      cat: 'air', lon: a.lon, lat: a.lat,
      detail: `${best.f.properties.title} · ${best.d.toFixed(1)} km · ${alt.toLocaleString()} ft`
    });
    saveFeed();
  }
}

// --- Canberra Stress Index: one number for "how lively is the city" ---
// Each contributor is capped so no single stream can pin the needle; the
// weights are editorial, tuned for "quiet Tuesday ≈ 0-15, bad day ≥ 45".
function computeStress() {
  const parts = [];
  const add = (label, v, cap) => {
    const s = Math.min(cap, Math.round(v));
    if (s > 0) parts.push([label, s]);
  };
  // ambulance callouts are the city's background hum (ESA always carries
  // 10-20) — only above-normal load scores, everything else is linear
  const catW = { fire: 8, hazmat: 8, rescue: 6, crash: 5, storm: 5,
    burn: 1, other: 2 };
  let act = 0, med = 0;
  state.esaFeats.forEach(f => {
    if (f.properties.cat === 'medical') med++;
    else act += catW[f.properties.cat] || 2;
  });
  act += Math.max(0, med - 12) * 2;
  add('ACT incidents', act, 40);
  const rfsW = { 'Emergency Warning': 25, 'Watch and Act': 15, 'Advice': 5 };
  add('NSW fire alerts',
    state.rfsFeats.reduce((t, f) => t + (rfsW[f.properties.category] || 2), 0), 30);
  const live = state.powerFeats.filter(f => f.properties.sev === 'unplanned');
  add('power outages',
    live.reduce((t, f) => t + 4 + (+f.properties.customers || 0) / 500, 0), 20);
  const bomW = { major: 20, moderate: 10, minor: 4 };
  add('BOM warnings',
    state.bomWarns.reduce((t, w) => t + (bomW[w.severity] || 4), 0), 25);
  let wx = 0;
  if (state.wx) {
    if (state.wx.gust >= 90) wx += 15; else if (state.wx.gust >= 60) wx += 8;
    if (state.wx.temp >= 38) wx += 8; else if (state.wx.temp <= 0) wx += 4;
    if (state.wx.precip >= 5) wx += 5;
  }
  add('weather', wx, 20);
  // air quality: worst station AQI; anything under FAIR is background
  const worstAqi = Math.max(0, ...state.airqFeats.map(f => f.properties.aqi || 0));
  add('air quality', worstAqi >= 200 ? 20 : worstAqi >= 150 ? 15 :
    worstAqi >= 100 ? 10 : worstAqi >= 67 ? 4 : 0, 20);
  // planned roadworks aren't stress; emergency-type closures are
  add('road closures', state.closureFeats.filter(f =>
    f.properties.active && f.properties.ctype === 'emergency').length * 5, 10);
  // a quake only registers if recent and roughly local (≤300 km, last 24 h)
  add('earthquakes', state.quakeFeats.reduce((t, f) => {
    const p = f.properties;
    if (p.ageH > 24 || kmDist(f.geometry.coordinates[1],
        f.geometry.coordinates[0], CBR.lat, CBR.lon) > 300) return t;
    return t + (p.mag >= 4 ? 15 : p.mag >= 3 ? 8 : 4);
  }, 0), 15);
  const cut = Date.now() - 30 * 60e3;
  add('recent alerts', feedState.events.filter(e =>
    e.t > cut && (e.kind === 'loiter' || e.kind === 'corr')).length * 5, 10);
  // anything live inside a watch zone matters more — it's near somewhere named
  if (zones.length) {
    const inz = f => zoneOf(f.geometry.coordinates[0], f.geometry.coordinates[1]);
    let z = 0;
    state.esaFeats.forEach(f => { if (inz(f)) z += 3; });
    state.rfsFeats.forEach(f => { if (inz(f)) z += 4; });
    state.powerFeats.filter(f => f.properties.sev === 'unplanned')
      .forEach(f => { if (inz(f)) z += 3; });
    add('watch zones', z, 15);
  }
  return { total: Math.min(100, parts.reduce((t, p) => t + p[1], 0)), parts };
}
const STRESS_LVL = [ // [floor, label, colour]
  [70, 'HIGH', 'var(--red)'], [45, 'ELEVATED', 'var(--amber)'],
  [20, 'GUARDED', 'var(--cyan)'], [0, 'LOW', 'var(--green)']
];
// 24 h score history → tiny trend line; one sample per 5 min is plenty
function stressSpark(total) {
  // don't record the empty-page 0 before any source has reported in
  if (!Object.values(HEALTH).some(h => h.lastOk)) return;
  let hist = JSON.parse(localStorage.getItem('copStressHist') || '[]');
  const now = Date.now();
  if (!hist.length || now - hist.at(-1)[0] > 5 * 60e3) {
    hist.push([now, total]);
    hist = hist.filter(([t]) => now - t < 24 * 3600e3);
    localStorage.setItem('copStressHist', JSON.stringify(hist));
  }
  const cv = document.getElementById('stress-spark');
  const g = cv.getContext('2d');
  g.clearRect(0, 0, cv.width, cv.height);
  if (hist.length < 2) return;
  const ymax = Math.max(40, ...hist.map(h => h[1]));
  g.strokeStyle = '#7dcfff'; g.lineWidth = 1; g.beginPath();
  hist.forEach(([t, v], i) => {
    const x = (1 - (now - t) / (24 * 3600e3)) * (cv.width - 1);
    const y = cv.height - 1 - (v / ymax) * (cv.height - 2);
    i ? g.lineTo(x, y) : g.moveTo(x, y);
  });

// level changes get a feed entry + a fresh SITREP, after a 2 min settle
// (sources load staggered on page open) and with a 10 min cooldown
const stressAuto = { t0: Date.now(), level: null, last: 0 };
function renderStress() {
  const { total, parts } = computeStress();
  const [, label, col] = STRESS_LVL.find(l => total >= l[0]);
  const now = Date.now();
  if (now - stressAuto.t0 > 120e3) {
    if (stressAuto.level && label !== stressAuto.level &&
        now - stressAuto.last > 600e3) {
      stressAuto.last = now;
      feedEvent('level', 'stress index',
        { title: `stress ${stressAuto.level} → ${label} (${total})`, cat: 'other' });
      saveFeed();
      loadSitrep().catch(() => {});
    }
    stressAuto.level = label;
  }
  stressSpark(total);
  const val = document.getElementById('stress-val');
  val.textContent = `${total} ${label}`;
  val.style.color = col;
  const bar = document.getElementById('stress-fill');
  bar.style.width = total + '%';
  bar.style.background = col;
  document.getElementById('stress-parts').innerHTML = parts.length
    ? parts.map(([n, v]) => `<div class="row"><span class="k">${n}</span>` +
        `<span>+${v}</span></div>`).join('')
    : '<span class="k">nothing scoring — quiet out there</span>';

// --- cross-stream correlation: two sources reporting the same place ---
// Each pass re-derives active pairs from current layer state; a pair emits
// one CORR feed entry (6 h debounce per pairing, persisted) and a dashed
// link line on the map for as long as both sides stay active.
const corrState = {
  seen: JSON.parse(localStorage.getItem('copCorrSeen') || '{}')
};
function corrRecords() {
  // normalise each stream to {id, lat, lon, ...} for the pair rules
  const pt = f => ({ lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] });
  const now = Date.now();
  return {
    esa: state.esaFeats.map(f => ({ ...pt(f), id: f.properties.guid,
      title: f.properties.title, cat: f.properties.cat })),
    rfs: state.rfsFeats.map(f => ({ ...pt(f), id: f.properties.title,
      title: f.properties.title, category: f.properties.category })),
    // FIRMS is a 48 h window; only hotspots seen in the last 12 h correlate
    firms: state.firmsFeats.map(f => {
      const p = f.properties;
      const ts = Date.parse(`${p.date}T${p.time.slice(0, 2)}:${p.time.slice(2)}:00Z`);
      return { ...pt(f), id: p.date + p.time + '@' +
        f.geometry.coordinates.map(c => c.toFixed(3)).join(','),
        sat: p.satellite, frp: p.frp, ts };
    }).filter(h => now - h.ts < 12 * 3600e3),
    power: state.powerFeats.map(f => ({ ...pt(f), id: String(f.properties.id),
      sev: f.properties.sev, customers: f.properties.customers })),
    // only live emergency/weather closures correlate — a crash next to a
    // months-old roadworks site is coincidence, not causation
    closures: state.closureFeats.filter(f => f.properties.active &&
      ['emergency', 'inclementWeather'].includes(f.properties.ctype))
      .map(f => ({ ...pt(f), id: String(f.properties.id),
        title: f.properties.roads || f.properties.title,
        suburb: f.properties.suburb }))

}
function correlate() {
  const s = corrRecords();
  const now = Date.now();
  const lines = [];
  const emit = (rule, a, b, d, ev) => {
    lines.push({ type: 'Feature', geometry: { type: 'LineString',
      coordinates: [[a.lon, a.lat], [b.lon, b.lat]] } });
    const key = `${rule}|${a.id}|${b.id}`;
    if (corrState.seen[key] && now - corrState.seen[key] < 6 * 3600e3) return;
    corrState.seen[key] = now;
    feedEvent('corr', ev.src, { ...ev,
      lon: (a.lon + b.lon) / 2, lat: (a.lat + b.lat) / 2,
      detail: (ev.detail ? ev.detail + ' · ' : '') + d.toFixed(1) + ' km apart' });
  };
  const pairUp = (rule, la, lb, km, mk) => {
    for (const a of la) for (const b of lb) {
      const d = kmDist(a.lat, a.lon, b.lat, b.lon);
      if (d <= km) emit(rule, a, b, d, mk(a, b));
    }
  };
  // satellite hotspot lands on a dispatched fire/burn → confirmed from orbit
  pairUp('esa-firms', s.esa.filter(e => e.cat === 'fire' || e.cat === 'burn'),
    s.firms, 3, (e, h) => ({ src: 'ESA+FIRMS', cat: e.cat,
      title: `satellite confirms: ${e.title}`,
      detail: `${h.sat} hotspot · ${h.frp} MW` }));
  // same fire tracked by both ACT ESA and NSW RFS → border incident
  pairUp('esa-rfs', s.esa, s.rfs, 5, (e, r) => ({ src: 'ESA+RFS', cat: e.cat,
    title: `ACT + NSW tracking: ${e.title}`, detail: `RFS: ${r.title}` }));
  // hotspot on an RFS fire that ESA isn't carrying
  pairUp('rfs-firms', s.rfs, s.firms, 3, (r, h) => ({ src: 'RFS+FIRMS',
    cat: 'fire', title: `satellite confirms: ${r.title}`,
    detail: `${h.sat} hotspot · ${h.frp} MW` }));
  // emergency road closure next to a crash/storm/fire → cause found
  pairUp('esa-closure', s.esa.filter(e =>
    ['crash', 'storm', 'fire'].includes(e.cat)), s.closures, 2,
    (e, c) => ({ src: 'ESA+closures', cat: e.cat,
      title: `road closed near: ${e.title}`,
      detail: (c.suburb ? c.suburb + ' · ' : '') + c.title.slice(0, 60) }));
  // unplanned outage next to a crash/storm/fire → probable cause found
  pairUp('power-esa', s.power.filter(p => p.sev === 'unplanned'),
    s.esa.filter(e => ['crash', 'storm', 'fire'].includes(e.cat)), 1.5,
    (p, e) => ({ src: 'power+ESA', cat: 'power',
      title: `outage co-located: ${e.title}`,
      detail: `${p.customers ?? '?'} customers off` }));
  // prune stale debounce keys, persist
  for (const [k, t] of Object.entries(corrState.seen))
    if (now - t > 24 * 3600e3) delete corrState.seen[k];
  localStorage.setItem('copCorrSeen', JSON.stringify(corrState.seen));
  const src = map.getSource('corr');
  if (src) src.setData({ type: 'FeatureCollection', features: lines });
  renderStress();
}

// --- time slider ------------------------------------------------------------
// Scrub the incident layers back through recorded history. Live-only layers
// (aircraft, transit, radar, wind) freeze; the seven incident layers repaint
// from /history at the chosen moment.
const INCIDENT_FETCHERS = [fetchIncidents, fetchFires, fetchRfs, fetchPower,
                           fetchAirq, fetchClosures, fetchQuakes];
const tb = { min: 0, max: 0 };
let tbPaintTimer = null;

const tbFmt = t => new Date(t * 1000).toLocaleString([],
  { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

// everything with recorded history — repainted on every scrub step and on
// return to live (all local serve.py hits, so a scrub is cheap)
const REPLAY_FETCHERS = [fetchAircraft, fetchTransit, fetchWind, fetchWeather,
  fetchBom, fetchNews];
function paintIncidents() {
  INCIDENT_FETCHERS.forEach(fn => fn());
  REPLAY_FETCHERS.forEach(fn => fn());
}

function clearLiveLayers() {
  // trails have no history (v1) — clear on entering replay. aircraft/transit
  // are repopulated from /history by the repaint that follows.
  ['trails'].forEach(s => {
    const src = map.getSource(s);
    if (src) src.setData({ type: 'FeatureCollection', features: [] });
  });
}

// radar is live-only (RainViewer raster tiles aren't recorded) — hide it in
// replay, restore to its toggle state when live. wind replays from history,
// so its visibility just follows its toggle.
function setLiveRastersVisible(vis) {
  if (map.getLayer('radar')) {
    const on = vis && document.getElementById('tog-radar').checked;
    map.setLayoutProperty('radar', 'visibility', on ? 'visible' : 'none');
  }
  // the 72 h heat aggregate is live-only too — a rolling window has no
  // meaning at a historical T
  if (map.getLayer('esa-heat')) {
    const on = vis && document.getElementById('tog-heat').checked;
    map.setLayoutProperty('esa-heat', 'visibility', on ? 'visible' : 'none');
  }
  // wind-flow particles animate CURRENT wind — freeze/hide them in replay
  flowApply(vis && document.getElementById('tog-flow').checked);
}

function enterReplay(t) {
  const wasLive = !REPLAY;
  REPLAY = t;
  const bar = document.getElementById('timebar');
  bar.classList.add('replay'); bar.classList.remove('live');
  document.getElementById('tb-slider').value = t;
  document.getElementById('tb-label').textContent = 'REPLAY ' + tbFmt(t);
  document.getElementById('tb-live').textContent = '▶ GO LIVE';
  if (wasLive) { clearLiveLayers(); setLiveRastersVisible(false); }
  clearTimeout(tbPaintTimer);           // debounce repaint while dragging
  tbPaintTimer = setTimeout(paintIncidents, 150);
}

function goLive() {
  stopPlay();                      // GO LIVE also halts a running playback
  const wasReplay = !!REPLAY;
  REPLAY = null;
  const bar = document.getElementById('timebar');
  bar.classList.remove('replay'); bar.classList.add('live');
  document.getElementById('tb-slider').value = tb.max;
  document.getElementById('tb-label').textContent = 'live';
  document.getElementById('tb-live').textContent = '● LIVE';
  if (wasReplay) {
    setLiveRastersVisible(true);
    paintIncidents();   // covers all layers + sidebars via REPLAY_FETCHERS
  }
}

async function refreshRange() {
  try {

// --- slider: activity shading ------------------------------------------------
// serve.py buckets snapshot-change counts per hour (dedup means rows only
// exist when something changed) — paint them as a heat strip under the track.
async function loadActivity() {
  if (!tb.max) return;
  try {
    const d = await (await fetch('history/activity')).json();
    const byHour = Object.fromEntries(d.buckets);
    const peak = Math.max(1, ...d.buckets.map(b => b[1]));
    const span = tb.max - tb.min || 1;
    const stops = [];
    for (let h = Math.floor(tb.min / 3600) * 3600; h < tb.max; h += 3600) {
      const p0 = Math.max(0, (h - tb.min) / span * 100).toFixed(2);
      const p1 = Math.min(100, (h + 3600 - tb.min) / span * 100).toFixed(2);
      const a = (byHour[h] || 0) / peak;
      const col = a === 0 ? 'transparent'
        : a > 0.66 ? '#f7768e' : a > 0.33 ? '#e0af68' : '#3b4261';
      stops.push(`${col} ${p0}% ${p1}%`);
    }
    document.getElementById('tb-activity').style.background =
      `linear-gradient(90deg, ${stops.join(',')})`;
  } catch (e) { /* strip is decorative */ }
}

// --- slider: event-feed tick marks --------------------------------------------
// Significant feed events as clickable jump points. Feed history only exists
// on this device (localStorage), so ticks cover what this browser has seen.
const TICK_KINDS = { loiter: 'var(--red)', corr: '#bb9af7',
  level: 'var(--cyan)', geo: 'var(--amber)' };
function renderTicks() {
  const box = document.getElementById('tb-ticks');
  if (!tb.max) { box.innerHTML = ''; return; }
  const span = tb.max - tb.min || 1;
  const sig = feedState.events.filter(ev => (ev.kind in TICK_KINDS) || ev.zone ||
    (ev.kind === 'new' && ['fire', 'hazmat', 'crash', 'rescue'].includes(ev.cat)));
  box.innerHTML = sig.filter(ev => ev.t / 1000 >= tb.min).map(ev => {
    const p = ((ev.t / 1000) - tb.min) / span * 100;
    const col = TICK_KINDS[ev.kind] || 'var(--green)';
    const tip = `${(ev.title || '').replace(/"/g, '&quot;')} · ${tbFmt(ev.t / 1000)}`;
    return `<i class="tb-tick" style="left:${p.toFixed(2)}%;background:${col}"
      title="${tip}" data-t="${Math.floor(ev.t / 1000)}"></i>`;
  }).join('');
  box.querySelectorAll('.tb-tick').forEach(el => el.onclick = () => {
    const t = +el.dataset.t;
    document.getElementById('tb-slider').value = t;
    enterReplay(t);
  });
}

// --- slider: playback ----------------------------------------------------------
const play = { timer: null, speed: 60 };   // replay seconds per real second
const PLAY_SPEEDS = [60, 300, 900];
function stopPlay() {
  clearInterval(play.timer); play.timer = null;
  const b = document.getElementById('tb-play');
  b.textContent = '▶'; b.classList.remove('on');
}
function initPlayback() {
  document.getElementById('tb-speed').onclick = e => {
    play.speed = PLAY_SPEEDS[(PLAY_SPEEDS.indexOf(play.speed) + 1) % PLAY_SPEEDS.length];
    e.target.textContent = (play.speed / 60) + 'm/s';
  };
  document.getElementById('tb-play').onclick = () => {
    if (play.timer) return stopPlay();
    if (!tb.max) return;
    const slider = document.getElementById('tb-slider');
    if (!REPLAY) { slider.value = tb.min; enterReplay(tb.min); } // from the far edge
    const b = document.getElementById('tb-play');
    b.textContent = '⏸'; b.classList.add('on');
    play.timer = setInterval(() => {
      const t = (+slider.value) + play.speed;  // follows manual scrubs too
      if (t >= tb.max - 30) { stopPlay(); goLive(); return; }
      slider.value = t; enterReplay(t);
    }, 1000);
  };
}

// --- slider: precision controls -------------------------------------------------
function nudge(d) {
  if (!tb.max) return;
  const slider = document.getElementById('tb-slider');
  const t = Math.max(tb.min, (REPLAY ?? tb.max) + d);
  if (t >= tb.max - 30) goLive();
  else { slider.value = t; enterReplay(t); }
}
function initPrecision() {
  document.querySelectorAll('.tb-n').forEach(b =>
    b.onclick = () => nudge(+b.dataset.d));
  // arrow keys scrub while in replay (typing fields excluded)
  document.addEventListener('keydown', e => {
    // typing fields keep their keys; focused map canvas keeps arrow-panning
    if (/INPUT|TEXTAREA|SELECT|CANVAS/.test(e.target.tagName) || !REPLAY) return;
    if (e.key === 'ArrowLeft') { nudge(e.shiftKey ? -3600 : -300); e.preventDefault(); }
    if (e.key === 'ArrowRight') { nudge(e.shiftKey ? 3600 : 300); e.preventDefault(); }
  });
  // click the timestamp → type an exact time
  document.getElementById('tb-label').onclick = () => {
    if (!tb.max || document.getElementById('tb-goto')) return;
    const label = document.getElementById('tb-label');
    const cur = new Date((REPLAY ?? tb.max) * 1000);
    const pad = n => String(n).padStart(2, '0');
    const inp = document.createElement('input');
    inp.type = 'datetime-local'; inp.id = 'tb-goto';
    inp.value = `${cur.getFullYear()}-${pad(cur.getMonth() + 1)}-${pad(cur.getDate())}` +
                `T${pad(cur.getHours())}:${pad(cur.getMinutes())}`;
    label.replaceChildren(inp); inp.focus();
    const done = commit => {
      inp.onblur = inp.onkeydown = null;      // Esc must beat the blur handler
      if (commit && inp.value) {
        const t = Math.floor(new Date(inp.value).getTime() / 1000);
        if (t >= tb.max - 30) { goLive(); return; }
        if (t >= tb.min) {
          document.getElementById('tb-slider').value = t;
          enterReplay(t); return;
        }
      }
      label.textContent = REPLAY ? 'REPLAY ' + tbFmt(REPLAY) : 'live';
    };
    inp.onkeydown = ev => {
      if (ev.key === 'Enter') done(true);
      if (ev.key === 'Escape') done(false);
    };
    inp.onblur = () => done(true);
  };
}

function initTimebar() {
  const slider = document.getElementById('tb-slider');

// wind arrow, pointing north = blowing toward the top; rotated per-feature
function windIcon(colour) {
  const c = document.createElement('canvas'); c.width = c.height = 26;
  const g = c.getContext('2d');
  g.translate(13, 13); g.strokeStyle = colour; g.fillStyle = colour;
  g.lineWidth = 2;
  g.beginPath(); g.moveTo(0, 9); g.lineTo(0, -4); g.stroke();
  g.beginPath(); g.moveTo(0, -10); g.lineTo(4.5, -3); g.lineTo(-4.5, -3);
  g.closePath(); g.fill();
  return g.getImageData(0, 0, 26, 26);
}

async function fetchIncidents() {
  const count = document.getElementById('esa-count');
  try {
    // relative path → serve.py relay; upstream ESA feed sends no CORS headers
    const r = await fetch(feedURL('esa'));
    if (!r.ok) throw new Error(r.status);
    const list = await r.json();
    const feats = list
      .filter(i => i.state === 'ACT' && i.point && i.point.coordinates)
      .map(i => {
        // description is an HTML blob of "Key: Value<br />" pairs — explode it
        const kv = {};
        i.description.split(/<br\s*\/?>/).forEach(line => {
          const m = line.match(/^\s*([\w ]+):\s*(.+)$/s);
          if (m) kv[m[1].trim().toLowerCase()] = m[2].trim();
        });
        // feed ships [lat, lon] as strings; GeoJSON wants numeric [lon, lat]
        const [lat, lon] = i.point.coordinates.map(Number);
        const cat = categorise(i.title);
        // urgency from CAD status: 2 = on scene, 1 = responding, 0 = pending
        const st = (kv.status || '').toUpperCase();
        const urg = /ON SCENE/.test(st) ? 2 : /ROUTE|RESPOND/.test(st) ? 1 : 0;
        return {
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lon, lat] },
          properties: {
            title: i.title, agency: kv.agency || '?',
            status: kv.status || '?', suburb: kv.suburb || '?',
            updated: kv.updated || '?',
            guid: i.guid || i.title, cat, icon: 'esa-' + cat, urg
          }
        };
      });
    map.getSource('esa').setData({ type: 'FeatureCollection', features: feats });
    count.textContent = `(${feats.length})`;
    state.esaFeats = feats;
    feedDiff('ACT ESA', feats.map(f => ({
      id: f.properties.guid, title: f.properties.title,
      status: f.properties.status, cat: f.properties.cat,
      detail: f.properties.suburb,
      lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
    correlate();
    mark('esa', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('esa', false);
  }
}

// Basemaps: three raster groups + the "dark+" Tokyo-Night vector group
// (vt-* layers injected from vt-style.json below 'base', so a visible raster
// always covers them). Until the vector style has loaded, 'dark+' keeps the
// carto raster up rather than showing a void.
const VT_IDS = [];
function applyBasemap(v) {
  for (const id of ['base', 'base-street', 'base-sat'])
    map.setLayoutProperty(id, 'visibility', id === v ? 'visible' : 'none');
  for (const id of VT_IDS)
    map.setLayoutProperty(id, 'visibility', v === 'vector' ? 'visible' : 'none');
  if (v === 'vector' && !VT_IDS.length)
    map.setLayoutProperty('base', 'visibility', 'visible');
}
document.querySelectorAll('#basemap input').forEach(radio =>
  radio.onchange = () => applyBasemap(radio.value));

async function initVectorBase() {
  const vecRadio = document.querySelector('#basemap input[value="vector"]');
  try {
    // no-cache: revalidate so a regenerated style isn't shadowed by the
    // browser's copy (stale fonts here = silent glyph failures)
    const st = await (await fetch('vt-style.json', { cache: 'no-cache' })).json();
    for (const [id, src] of Object.entries(st.sources))
      if (!map.getSource(id)) map.addSource(id, src);
    for (const lyr of st.layers) {
      map.addLayer(lyr, 'base');       // insert below the raster basemaps
      VT_IDS.push(lyr.id);
    }
    applyBasemap(document.querySelector('#basemap input:checked').value);
  } catch (e) {
    // no vt-style.json (or OFM down): raster fallback, grey the option out
    vecRadio.disabled = true;
    if (vecRadio.checked) {
      document.querySelector('#basemap input[value="base"]').checked = true;
      applyBasemap('base');
    }
  }
}

// --- wind-flow particles -------------------------------------------------------
// The windy.com party trick, built from our own data: /windfield serves a
// 14x14 u/v grid (Open-Meteo, hourly); particles advect through it on a
// canvas overlay with fading trails. Live-only, like radar — geo positions
// survive pans/zooms, trails clear so they don't smear.
const flow = { on: false, field: null, parts: [], raf: null,
  canvas: null, ctx: null, cw: 0, ch: 0 };
const FLOW_N = matchMedia('(max-width: 700px)').matches ? 500 : 1500;

function flowResize() {
  const el = map.getContainer(), dpr = window.devicePixelRatio || 1;
  flow.cw = el.clientWidth; flow.ch = el.clientHeight;
  flow.canvas.width = flow.cw * dpr; flow.canvas.height = flow.ch * dpr;
  flow.canvas.style.width = flow.cw + 'px';
  flow.canvas.style.height = flow.ch + 'px';
  flow.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function flowInit() {
  const cv = document.createElement('canvas');
  cv.style.cssText =
    'position:absolute;inset:0;z-index:2;pointer-events:none';
  map.getContainer().appendChild(cv);
  flow.canvas = cv; flow.ctx = cv.getContext('2d');
  flowResize();
  map.on('resize', flowResize);
  // projection changed mid-trail — wipe so trails don't smear across the map
  map.on('move', () => flow.ctx.clearRect(0, 0, flow.cw, flow.ch));
}

function flowSample(lon, lat) {   // bilinear u/v (m/s); null outside the grid
  const f = flow.field;
  const fx = (lon - f.lon0) / (f.lon1 - f.lon0) * (f.nx - 1);
  const fy = (lat - f.lat0) / (f.lat1 - f.lat0) * (f.ny - 1);
  if (fx < 0 || fy < 0 || fx > f.nx - 1 || fy > f.ny - 1) return null;
  const x0 = Math.floor(fx), y0 = Math.floor(fy);
  const x1 = Math.min(x0 + 1, f.nx - 1), y1 = Math.min(y0 + 1, f.ny - 1);
  const tx = fx - x0, ty = fy - y0, ix = (x, y) => y * f.nx + x;
  const lerp2 = a =>
    a[ix(x0, y0)] * (1 - tx) * (1 - ty) + a[ix(x1, y0)] * tx * (1 - ty) +
    a[ix(x0, y1)] * (1 - tx) * ty + a[ix(x1, y1)] * tx * ty;
  return [lerp2(f.u), lerp2(f.v)];
}

function flowSpawn(p) {
  const f = flow.field, b = map.getBounds();
  let w = Math.max(f.lon0, b.getWest()), e = Math.min(f.lon1, b.getEast());
  let s = Math.max(f.lat0, b.getSouth()), n = Math.min(f.lat1, b.getNorth());
  if (e <= w) { w = f.lon0; e = f.lon1; }   // viewport left the grid entirely
  if (n <= s) { s = f.lat0; n = f.lat1; }
  p.lon = w + Math.random() * (e - w);
  p.lat = s + Math.random() * (n - s);
  p.age = 40 + Math.random() * 120;
}

function flowColour(spd) {        // m/s → Tokyo-Night ramp
  return spd < 2 ? 'rgba(59,66,97,0.7)' : spd < 5 ? 'rgba(122,162,247,0.7)'
    : spd < 8 ? 'rgba(125,207,255,0.75)' : spd < 12 ? 'rgba(224,175,104,0.8)'
    : 'rgba(247,118,142,0.85)';
}

function flowFrame() {
  if (!flow.on) return;
  const ctx = flow.ctx;
  // decay existing trails, then draw this frame's segments on top
  ctx.globalCompositeOperation = 'destination-in';
  ctx.fillStyle = 'rgba(0,0,0,0.93)';
  ctx.fillRect(0, 0, flow.cw, flow.ch);
  ctx.globalCompositeOperation = 'source-over';
  // gentle zoom damping so flow reads at street zooms too
  const k = 6e-5 * Math.pow(2, (9 - map.getZoom()) * 0.5);
  ctx.lineWidth = 1.1;
  for (const p of flow.parts) {
    if (--p.age <= 0) { flowSpawn(p); continue; }
    const uv = flowSample(p.lon, p.lat);
    if (!uv) { flowSpawn(p); continue; }
    const nlat = p.lat + uv[1] * k;
    const nlon = p.lon + uv[0] * k / Math.cos(p.lat * Math.PI / 180);
    const a = map.project([p.lon, p.lat]);
    const b = map.project([nlon, nlat]);
    ctx.strokeStyle = flowColour(Math.hypot(uv[0], uv[1]));
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
    p.lon = nlon; p.lat = nlat;
  }
  flow.raf = requestAnimationFrame(flowFrame);
}

// single gate for toggle + replay: particles run only when enabled AND live
function flowApply(run) {
  if (run && !flow.on) {
    if (!flow.field) return;               // data not in yet; retried on fetch
    if (!flow.canvas) flowInit();
    flow.canvas.style.display = '';
    if (!flow.parts.length)
      flow.parts = Array.from({ length: FLOW_N }, () => {
        const p = {}; flowSpawn(p); p.age *= Math.random(); return p;
      });
    flow.on = true;
    flow.raf = requestAnimationFrame(flowFrame);
  } else if (!run && flow.on) {
    flow.on = false;
    cancelAnimationFrame(flow.raf);
    flow.ctx.clearRect(0, 0, flow.cw, flow.ch);
    flow.canvas.style.display = 'none';
  }
}

let flowStarted = false;
async function fetchWindField() {
  try {
    const r = await fetch('windfield');
    if (!r.ok) throw new Error(r.status);
    flow.field = await r.json();
    // first data arriving after the user already ticked the box
    flowApply(document.getElementById('tog-flow').checked && !REPLAY);
  } catch (e) { /* decorative — next interval retries */ }
}
document.getElementById('tog-flow').onchange = e => {
  if (e.target.checked && !flowStarted) {
    flowStarted = true;
    fetchWindField(); setInterval(fetchWindField, 60 * 60000);
  }
  flowApply(e.target.checked && !REPLAY);
};

// Address search: geocode via serve.py (Nominatim relay), then fly to the
// pick and drop a marker. Enter submits; results list is clickable.
let searchMarker = null;
const addrInput = document.getElementById('addr-search');
const addrResults = document.getElementById('addr-results');
addrInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const q = addrInput.value.trim();
  if (!q) return;
  addrResults.innerHTML = '<div class="sr-msg">searching…</div>';
  try {
    const r = await fetch('geocode?q=' + encodeURIComponent(q));
    if (!r.ok) throw new Error(r.status);
    const hits = await r.json();
    if (!hits.length) {
      addrResults.innerHTML = '<div class="sr-msg">no matches near Canberra</div>';
      return;
    }
    addrResults.innerHTML = hits.map((h, i) =>
      `<div class="sr" data-i="${i}">${h.name}</div>`).join('');
    addrResults.querySelectorAll('.sr').forEach(el =>
      el.onclick = () => pickAddress(hits[+el.dataset.i]));
  } catch (err) {
    addrResults.innerHTML = '<div class="sr-msg">search unavailable (needs serve.py)</div>';
  }
});
function pickAddress(h) {
  if (searchMarker) searchMarker.remove();
  searchMarker = new maplibregl.Marker({ color: '#7dcfff' })
    .setLngLat([h.lon, h.lat])
    .setPopup(new maplibregl.Popup({ offset: 24 }).setHTML(`📍 ${h.name}`))
    .addTo(map);
  searchMarker.togglePopup();
  map.flyTo({ center: [h.lon, h.lat], zoom: 15 });
  addrResults.innerHTML = '';
}

async function fetchFires() {
  const count = document.getElementById('fires-count');
  try {
    const r = await fetch(feedURL('firms'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    map.getSource('fires').setData(geo);
    count.textContent = `(${geo.features.length})`;
    state.firmsFeats = geo.features;
    correlate();
    mark('firms', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('firms', false);
  }
}

async function fetchRfs() {
  const count = document.getElementById('rfs-count');
  try {
    const r = await fetch(feedURL('rfs'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    const feats = geo.features
      .map(f => {
        // big fires ship a GeometryCollection (point + burnt-area polygon);
        // keep just the point for pin display
        const g = f.geometry.type === 'GeometryCollection'
          ? f.geometry.geometries.find(g => g.type === 'Point')
          : (f.geometry.type === 'Point' ? f.geometry : null);
        if (!g) return null;
        const kv = {};
        (f.properties.description || '').split(/<br\s*\/?>/).forEach(line => {
          const m = line.match(/^\s*([\w ]+):\s*(.+)$/s);
          if (m) kv[m[1].trim().toLowerCase()] = m[2].trim();
        });
        return {
          type: 'Feature', geometry: g,
          properties: {
            title: f.properties.title, category: f.properties.category,
            status: kv.status || '?', rfstype: kv.type || '?',
            size: kv.size || '?'
          }
        };
      })
      .filter(f => f && f.geometry.coordinates[0] > 148.2 &&
        f.geometry.coordinates[0] < 150.5 &&
        f.geometry.coordinates[1] > -36.5 && f.geometry.coordinates[1] < -34.2);
    map.getSource('rfs').setData({ type: 'FeatureCollection', features: feats });
    count.textContent = `(${feats.length})`;
    state.rfsFeats = feats;
    feedDiff('NSW RFS', feats.map(f => ({
      id: f.properties.title, title: f.properties.title,
      status: f.properties.status, cat: 'fire',
      detail: f.properties.category,
      lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
    correlate();
    mark('rfs', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('rfs', false);
  }
}

async function fetchPower() {
  const count = document.getElementById('power-count');
  try {
    const r = await fetch(feedURL('power'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    map.getSource('power').setData(geo);
    // one pin per outage (polygons are duplicates of the same outage)
    const pins = geo.features.filter(f => f.geometry.type === 'Point');
    const live = pins.filter(f => f.properties.sev !== 'scheduled').length;
    count.textContent = `(${live} live / ${pins.length - live} sched)`;
    // scheduled works stay out of the feed — only live outages are events
    feedDiff('power', pins.filter(f => f.properties.sev !== 'scheduled')
      .map(f => ({
        id: String(f.properties.id),
        title: `${f.properties.otype || 'power'} outage — ` +
          String(f.properties.where || f.properties.id).slice(0, 40),
        status: f.properties.sev + '|' + (f.properties.eta || ''),
        cat: 'power', detail: `${f.properties.customers ?? '?'} customers`,
        lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
    state.powerFeats = pins;
    correlate();
    mark('power', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('power', false);
  }
}

async function fetchTransit() {
  const wasReplay = !!REPLAY;
  const count = document.getElementById('transit-count');
  try {
    const r = await fetch(feedURL('transit'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    // stamp position age (staleness fade) — relative to the snapshot time in
    // replay, else every historical position would render fully faded
    const now = wasReplay ? REPLAY : Date.now() / 1000;
    geo.features.forEach(f => {
      const p = f.properties;
      p.age = p.ts ? Math.max(0, Math.round(now - p.ts)) : 0;
      if (wasReplay) return;  // no breadcrumb collection off historical data
      const id = p.label || p.route;
      if (!id) return;
      const h = TRANSIT_HIST[id] = TRANSIT_HIST[id] || { mode: p.mode, pts: [] };
      const [lon, lat] = f.geometry.coordinates;
      const last = h.pts.at(-1);
      if (!last || last[0] !== lon || last[1] !== lat) h.pts.push([lon, lat, now]);
      if (h.pts.length > 16) h.pts.shift();
    });
    map.getSource('transit').setData(geo);
    count.textContent = `(${geo.features.length})`;
    if (wasReplay) return;
    for (const k of Object.keys(TRANSIT_HIST))   // forget vanished vehicles
      if (now - TRANSIT_HIST[k].pts.at(-1)[2] > 300) delete TRANSIT_HIST[k];
    renderTrails();
    mark('transit', true);
  } catch (e) {
    if (wasReplay) return;
    count.textContent = '(needs serve.py)';
    mark('transit', false);
  }
}

async function fetchClosures() {
  const count = document.getElementById('closures-count');
  try {
    const r = await fetch(feedURL('closures'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    map.getSource('closures').setData(geo);
    state.closureFeats = geo.features;
    const active = geo.features.filter(f => f.properties.active);
    count.textContent =
      `(${active.length} now / ${geo.features.length - active.length} soon)`;
    // feed sees both states, so an upcoming one flipping live logs as UPD
    feedDiff('road closures', geo.features.map(f => {
      const p = f.properties;
      return {
        id: String(p.id),
        title: (p.suburb ? p.suburb + ' — ' : '') +
          ((p.roads || p.title).split('.')[0].slice(0, 70) || 'road closure'),
        status: p.active ? 'closed' : 'upcoming',
        cat: 'road', detail: p.ctype,
        lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] };
    }));
    correlate();
    mark('roads', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('roads', false);
  }
}

async function fetchQuakes() {
  const count = document.getElementById('quakes-count');
  try {
    const r = await fetch(feedURL('quakes'));
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    const now = Date.now();
    geo.features.forEach(f => {
      f.properties.ageH = f.properties.time
        ? Math.max(0, (now - Date.parse(f.properties.time)) / 3600e3) : 0;
    });
    map.getSource('quakes').setData(geo);
    state.quakeFeats = geo.features;
    count.textContent = `(${geo.features.length}/7d)`;
    // new quakes are feed-worthy; magnitude revisions surface as UPD
    feedDiff('quakes', geo.features.map(f => {
      const p = f.properties;
      return {
        id: String(p.id), title: `M${p.mag} quake — ${p.place}`,
        status: 'M' + p.mag, cat: 'quake',
        detail: (p.depth != null ? p.depth + ' km deep' : '') +
          (p.felt ? ` · ${p.felt} felt reports` : ''),
        lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] };
    }));
    renderStress();
    mark('quake', true);
  } catch (e) {
    count.textContent = '(needs serve.py)';
    mark('quake', false);
  }
}

async function fetchBom() {
  const wasReplay = !!REPLAY;
  const box = document.getElementById('bomwarn');
  try {
    const r = await fetch(feedURL('bom'));
    if (!r.ok) throw new Error(r.status);
    const warns = await r.json();
    // severity order so the worst sits on top
    const rank = { major: 0, moderate: 1, minor: 2 };
    warns.sort((a, b) => (rank[a.severity] ?? 3) - (rank[b.severity] ?? 3));
    if (!wasReplay) {  // historical warnings render, but don't feed stress/diff
      state.bomWarns = warns;
      renderStress();
      // new / severity-changed warnings become feed entries (no geometry,
      // so the entries don't fly-to on click)
      feedDiff('BOM', warns.map(w => ({ id: String(w.id),
        title: w.short || w.title, status: w.severity || '?',
        cat: categorise(w.title), detail: w.severity || '' })));
    }
    box.className = warns.length ? 'has-warn' : '';
    box.innerHTML = warns.map(w => {
      const t = w.expires ? new Date(w.expires) : null;
      const till = t ? `until ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}` : '';
      return `<div class="bw ${w.severity || ''}" data-id="${w.id}">
        <span class="bt">⚠ ${w.short || w.title}</span>
        <span class="bm">${w.title !== w.short ? w.title + ' · ' : ''}${till}</span>
        <div class="bd"></div>
      </div>`;
    }).join('');
    box.querySelectorAll('.bw').forEach(el => el.onclick = () => toggleBom(el));
    if (!wasReplay) mark('bom', true);
  } catch (e) {
    box.className = '';
    box.innerHTML = '';
    if (!wasReplay) mark('bom', false);
  }
}

// Expand a warning to its full BOM text, lazy-loaded on first open.
async function toggleBom(el) {
  const bd = el.querySelector('.bd');
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  el.classList.add('open');
  if (bd.dataset.loaded) return;
  bd.innerHTML = '<span class="bm">loading…</span>';
  try {
    const r = await fetch('bomdetail?id=' + encodeURIComponent(el.dataset.id));
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    bd.innerHTML = d.message || '<span class="bm">no detail available</span>';
    bd.dataset.loaded = '1';
  } catch (e) {
    bd.innerHTML = '<span class="bm">detail unavailable</span>';
  }
}

async function fetchNews() {
  const wasReplay = !!REPLAY;
  const note = document.getElementById('news-note');
  try {
    const r = await fetch(feedURL('news'));
    if (!r.ok) throw new Error(r.status);
    const items = await r.json();
    const ago = ts => {  // "N ago" relative to the snapshot time in replay
      const m = Math.round(((wasReplay ? REPLAY : Date.now() / 1000) - ts) / 60);
      return m < 60 ? `${m}m` : `${Math.round(m / 60)}h`;
    };
    document.getElementById('newslist').innerHTML = items.map(i =>
      `<a href="${i.link}" target="_blank" rel="noopener">${i.title}
       <span class="src">— ${i.source}, ${ago(i.ts)} ago</span></a>`).join('');
    note.textContent = '';
    if (!wasReplay) mark('news', true);
  } catch (e) {
    if (wasReplay) return;
    note.textContent = '(needs serve.py)'; mark('news', false);
  }
}

// Traffic tiles cost API quota, so the layer is off by default and only
// created on first toggle. Key stays in serve.py; page never sees it.
document.getElementById('tog-traffic').onchange = async e => {
  const note = document.getElementById('traffic-note');
  if (!map.getSource('traffic')) {
    try {
      const probe = await fetch('tomtom/9/468/314.png');
      if (!probe.ok) throw new Error(probe.status);
      map.addSource('traffic', { type: 'raster',
        tiles: [`${location.origin}/tomtom/{z}/{x}/{y}.png`],
        tileSize: 256, minzoom: 6, maxzoom: 16 });
      map.addLayer({ id: 'traffic', type: 'raster', source: 'traffic',
        paint: { 'raster-opacity': 0.8 } }, 'aircraft');
      note.textContent = '';
    } catch (err) {
      note.textContent = '(needs serve.py + key)';
      e.target.checked = false;
      return;
    }
  }
  map.setLayoutProperty('traffic', 'visibility',
    e.target.checked ? 'visible' : 'none');
};
