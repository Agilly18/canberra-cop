<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Canberra COP — proof of concept</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root {
    --bg: #1a1b26; --panel: #24283bee; --fg: #c0caf5; --dim: #565f89;
    --cyan: #7dcfff; --amber: #e0af68; --red: #f7768e; --green: #9ece6a;
  }
  html, body { margin: 0; height: 100%; background: var(--bg);
    font-family: monospace; color: var(--fg); }
  #map { position: absolute; inset: 0; }

  #panel { position: absolute; top: 12px; left: 12px; width: 320px;
    max-height: calc(100vh - 24px); overflow-y: auto;
    background: var(--panel); border: 1px solid var(--dim); border-radius: 8px;
    padding: 14px 18px; font-size: 14px; backdrop-filter: blur(4px); }
  #panel h1 { margin: 0 0 2px; font-size: 17px; color: var(--cyan);
    letter-spacing: 1px; }
  #panel .sub { color: var(--dim); margin-bottom: 10px; }
  .row { display: flex; justify-content: space-between; margin: 2px 0; }
  .row .k { color: var(--dim); }
  hr { border: none; border-top: 1px solid var(--dim); margin: 8px 0; }
  label { display: flex; gap: 6px; align-items: center; cursor: pointer;
    margin: 3px 0; user-select: none; }

  #status { display: flex; gap: 6px; align-items: center; margin-top: 8px;
    color: var(--dim); }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  #dot.ok { background: var(--green); } #dot.err { background: var(--red); }

  #addr-search { width: 100%; box-sizing: border-box; margin-bottom: 6px;
    background: #1a1b2680; border: 1px solid var(--dim); border-radius: 4px;
    color: var(--fg); font-family: monospace; font-size: 13px; padding: 6px 8px; }
  #addr-search::placeholder { color: var(--dim); }
  #addr-search:focus { outline: none; border-color: var(--cyan); }
  #addr-results { margin-bottom: 4px; }
  #addr-results .sr { padding: 4px 6px; border-radius: 4px; cursor: pointer;
    font-size: 11px; line-height: 1.35; border-bottom: 1px solid #ffffff10; }
  #addr-results .sr:hover { background: #414868; }
  #addr-results .sr-msg { color: var(--dim); font-size: 11px; padding: 2px 6px; }

  #bomwarn { margin-top: 8px; display: none; }
  #bomwarn.has-warn { display: block; }
  #bomwarn .bw { border-left: 3px solid var(--dim); padding: 3px 8px;
    margin: 4px 0; border-radius: 0 4px 4px 0; background: #ffffff08;
    cursor: pointer; }
  #bomwarn .bw:hover { background: #ffffff14; }
  #bomwarn .bw.major { border-left-color: var(--red); }
  #bomwarn .bw.moderate { border-left-color: var(--amber); }
  #bomwarn .bw.minor { border-left-color: var(--cyan); }
  #bomwarn .bw .bt { display: block; }
  #bomwarn .bw .bt::before { content: '▸ '; color: var(--dim); }
  #bomwarn .bw.open .bt::before { content: '▾ '; }
  #bomwarn .bw .bm { color: var(--dim); font-size: 11px; }
  #bomwarn .bd { display: none; margin-top: 6px; font-size: 11px;
    line-height: 1.4; max-height: 240px; overflow-y: auto; }
  #bomwarn .bw.open .bd { display: block; }
  #bomwarn .bd h2 { font-size: 12px; margin: 4px 0; color: var(--fg); }
  #bomwarn .bd p { margin: 4px 0; }
  #bomwarn .bd .p-id, #bomwarn .bd .source, #bomwarn .bd .dt { color: var(--dim); }

  #aclist { max-height: 200px; overflow-y: auto; margin-top: 4px; }
  #newslist { max-height: 190px; overflow-y: auto; margin-top: 4px; }
  #newslist a { display: block; color: var(--fg); text-decoration: none;
    padding: 2px 4px; border-radius: 4px; }
  #newslist a:hover { background: #414868; }
  #newslist .src { color: var(--dim); font-size: 11px; }
  #feedlist { max-height: 230px; overflow-y: auto; margin-top: 4px; }
  .fe { display: flex; gap: 7px; padding: 3px 6px; margin: 3px 0;
    border-left: 3px solid var(--dim); border-radius: 0 4px 4px 0;
    background: #ffffff08; cursor: pointer; font-size: 12px; line-height: 1.35; }
  .fe:hover { background: #ffffff14; }
  .fe .fe-m { color: var(--dim); font-size: 11px; }
  .fe .fe-k { font-weight: bold; }
  .fe.fresh { animation: fefresh 1.2s ease-out 4; }
  @keyframes fefresh { 0% { background: #7dcfff44; } 100% { background: #ffffff08; } }
  #aclist .ac { display: grid; grid-template-columns: 70px 46px 1fr;
    gap: 6px; padding: 2px 4px; border-radius: 4px; cursor: pointer; }
  #aclist .ac:hover { background: #414868; }
  #aclist .mil { color: var(--red); }
  .legend { display: flex; gap: 10px; margin-top: 6px; color: var(--dim); }
  .legend b { font-weight: normal; }
  .lo { color: var(--amber); } .hi { color: var(--cyan); } .ml { color: var(--red); }

  .maplibregl-popup-content { background: var(--panel); color: var(--fg);
    font-family: monospace; font-size: 12px; border: 1px solid var(--dim); }
  .maplibregl-popup-tip { border-top-color: var(--panel) !important; }
</style>
</head>
<body>
<div id="map"></div>

<div id="panel">
  <h1>CANBERRA COP</h1>
  <div class="sub">proof of concept · all-source</div>

  <input id="addr-search" type="text" placeholder="search address…" autocomplete="off">
  <div id="addr-results"></div>

  <div class="row"><span class="k">temp / feels</span><span id="wx-temp">—</span></div>
  <div class="row"><span class="k">wind</span><span id="wx-wind">—</span></div>
  <div class="row"><span class="k">conditions</span><span id="wx-cond">—</span></div>
  <div id="bomwarn"></div>
  <hr>
  <div class="row" id="basemap" style="gap:8px; justify-content:flex-start">
    <span class="k">map</span>
    <label style="margin:0"><input type="radio" name="base" value="base" checked> dark</label>
    <label style="margin:0"><input type="radio" name="base" value="base-street"> street</label>
    <label style="margin:0"><input type="radio" name="base" value="base-sat"> satellite</label>
  </div>
  <label><input type="checkbox" id="tog-ac" checked> aircraft <span id="ac-count" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-radar" checked> rain radar</label>
  <label><input type="checkbox" id="tog-esa" checked> esa incidents <span id="esa-count" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-traffic"> traffic flow <span id="traffic-note" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-fires" checked> fire hotspots <span id="fires-count" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-rfs" checked> nsw rfs <span id="rfs-count" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-power" checked> power outages <span id="power-count" style="color:var(--dim)"></span></label>
  <label><input type="checkbox" id="tog-transit" checked> transit <span id="transit-count" style="color:var(--dim)"></span></label>
  <div class="legend"><b class="lo">▲ &lt;10k ft</b><b class="hi">▲ ≥10k ft</b><b class="ml">▲ military</b></div>
  <div id="aclist"></div>
  <hr>
  <div class="row"><span class="k">event feed</span><span id="feed-note" style="color:var(--dim)"></span></div>
  <div id="feedlist"></div>
  <hr>
  <div class="row"><span class="k">canberra news</span><span id="news-note" style="color:var(--dim)"></span></div>
  <div id="newslist"></div>
  <div id="status"><div id="dot"></div><span id="status-text">connecting…</span></div>
</div>

<script>
const CBR = { lat: -35.28, lon: 149.13, radiusNm: 60 };
const WMO = { 0:'clear', 1:'mostly clear', 2:'partly cloudy', 3:'overcast',
  45:'fog', 48:'rime fog', 51:'drizzle', 53:'drizzle', 55:'drizzle',
  61:'light rain', 63:'rain', 65:'heavy rain', 71:'light snow', 73:'snow',
  75:'heavy snow', 80:'showers', 81:'showers', 82:'heavy showers',
  95:'thunderstorm', 96:'thunderstorm', 99:'thunderstorm' };

const map = new maplibregl.Map({
  container: 'map',
  center: [CBR.lon, CBR.lat],
  zoom: 9,
  style: {
    version: 8,
    // needed by any symbol layer with text (transit labels)
    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources: {
      carto: {
        type: 'raster', tileSize: 256,
        tiles: ['https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
        attribution: '© OpenStreetMap © CARTO · aircraft: airplanes.live · wx: Open-Meteo · radar: RainViewer · outages: Evoenergy / Essential Energy · transit: Transport Canberra'
      },
      osm: {
        type: 'raster', tileSize: 256,
        tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
        attribution: '© OpenStreetMap contributors'
      },
      esri: {
        type: 'raster', tileSize: 256,
        // note {y}/{x} order — ArcGIS tile scheme
        tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
        attribution: 'Imagery © Esri, Maxar, Earthstar Geographics'
      }
    },
    layers: [
      { id: 'base', type: 'raster', source: 'carto' },
      { id: 'base-street', type: 'raster', source: 'osm',
        layout: { visibility: 'none' } },
      { id: 'base-sat', type: 'raster', source: 'esri',
        layout: { visibility: 'none' } }
    ]
  }
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

// Plane icon drawn on canvas, pointing north; one per colour class since
// canvas images can't be recoloured per-feature like SDFs.
function planeIcon(colour) {
  const c = document.createElement('canvas'); c.width = c.height = 36;
  const g = c.getContext('2d');
  g.translate(18, 18); g.fillStyle = colour;
  g.beginPath();
  g.moveTo(0, -13); g.lineTo(2.5, -6); g.lineTo(12, 1); g.lineTo(12, 4);
  g.lineTo(2, 1); g.lineTo(1.5, 8); g.lineTo(5, 11); g.lineTo(5, 13);
  g.lineTo(0, 11.5); g.lineTo(-5, 13); g.lineTo(-5, 11); g.lineTo(-1.5, 8);
  g.lineTo(-2, 1); g.lineTo(-12, 4); g.lineTo(-12, 1); g.lineTo(-2.5, -6);
  g.closePath(); g.fill();
  return g.getImageData(0, 0, 36, 36);
}

const state = { planes: [], radarFrame: null, esaFeats: [] };

// --- incident taxonomy: category from title keywords → colour + icon ---
// planned burns get their own muted class so real fires stand out
const CAT = {
  crash:   { col: '#e0af68', emoji: '🚗', label: 'crash' },
  fire:    { col: '#f7768e', emoji: '🔥', label: 'fire' },
  burn:    { col: '#ff9e64', emoji: '🔥', label: 'planned burn' },
  medical: { col: '#9ece6a', emoji: '🚑', label: 'medical' },
  rescue:  { col: '#7dcfff', emoji: '⛑️', label: 'rescue' },
  hazmat:  { col: '#bb9af7', emoji: '☣️', label: 'hazmat' },
  storm:   { col: '#2ac3de', emoji: '🌩️', label: 'storm/ses' },
  power:   { col: '#e0af68', emoji: '⚡', label: 'power' },
  air:     { col: '#f7768e', emoji: '🚁', label: 'aircraft' },
  other:   { col: '#565f89', emoji: '📍', label: 'other' }
};
function categorise(title) {
  const t = (title || '').toUpperCase();
  if (/HAZARD REDUCTION|PRESCRIBED|PILE BURN/.test(t)) return 'burn';
  if (/MOTOR VEHICLE|MVA|COLLISION|CRASH|VEHICLE ACCIDENT/.test(t)) return 'crash';
  if (/HAZMAT|CHEMICAL|GAS LEAK|FUEL|SPILL/.test(t)) return 'hazmat';
  if (/RESCUE|TRAPPED|SEARCH/.test(t)) return 'rescue';
  if (/AMBULANCE|MEDICAL/.test(t)) return 'medical';
  if (/STORM|TREE DOWN|TREE |FLOOD|ROOF|SES/.test(t)) return 'storm';
  if (/FIRE|SMOKE|ALARM|BURN/.test(t)) return 'fire';
  return 'other';
}

// Category pin: coloured disc + dark glyph, same canvas technique as the
// aircraft icons (map glyph fonts can't render emoji)
function incidentIcon(cat, fill, stroke = '#1a1b26') {
  const col = fill || CAT[cat].col;
  const c = document.createElement('canvas'); c.width = c.height = 30;
  const g = c.getContext('2d');
  g.translate(15, 15);
  g.beginPath(); g.arc(0, 0, 12, 0, 7);
  g.fillStyle = col; g.fill();
  g.lineWidth = 2; g.strokeStyle = stroke; g.stroke();
  g.fillStyle = '#1a1b26';
  g.beginPath();
  switch (cat) {
    case 'crash': // car: cabin + body + wheels
      g.moveTo(-4, -2); g.lineTo(-3, -6); g.lineTo(3, -6); g.lineTo(5, -2);
      g.closePath(); g.rect(-8, -2, 16, 5); g.fill();
      g.beginPath(); g.arc(-4.5, 4.5, 2.2, 0, 7); g.arc(4.5, 4.5, 2.2, 0, 7);
      g.fill();
      break;
    case 'fire': case 'burn': // flame
      g.moveTo(0, -9); g.quadraticCurveTo(7, -2, 5, 4);
      g.quadraticCurveTo(4, 8, 0, 9); g.quadraticCurveTo(-4, 8, -5, 4);
      g.quadraticCurveTo(-7, -2, 0, -9); g.fill();
      break;
    case 'medical': // plus
      g.rect(-2.5, -8, 5, 16); g.rect(-8, -2.5, 16, 5); g.fill();
      break;
    case 'rescue': // life ring
      g.arc(0, 0, 7.5, 0, 7); g.arc(0, 0, 3.5, 0, 7, true); g.fill('evenodd');
      break;
    case 'hazmat': // exclamation
      g.rect(-2, -9, 4, 11); g.fill();
      g.beginPath(); g.arc(0, 6, 2.2, 0, 7); g.fill();
      break;
    case 'storm': // bolt
      g.moveTo(2, -9); g.lineTo(-5, 1); g.lineTo(-1, 1); g.lineTo(-2, 9);
      g.lineTo(5, -2); g.lineTo(1, -2); g.closePath(); g.fill();
      break;
    default:
      g.arc(0, 0, 3.5, 0, 7); g.fill();
  }
  return g.getImageData(0, 0, 30, 30);
}

// --- event feed: diff each poll against known state, log what changed ---
const feedState = {
  events: JSON.parse(localStorage.getItem('copFeedEvents') || '[]'),
  known: JSON.parse(localStorage.getItem('copFeedKnown') || '{}'),
  loiterSeen: {}
};
function feedDiff(src, items) {
  const prev = feedState.known[src];
  const cur = {};
  items.forEach(i => cur[i.id] = i);
  feedState.known[src] = cur;
  if (!prev) { saveFeed(); return; } // first sight of a source: seed silently
  for (const [id, i] of Object.entries(cur)) {
    if (!(id in prev)) feedEvent('new', src, i);
    else if (prev[id].status !== i.status)
      feedEvent('update', src, i, `${prev[id].status} → ${i.status}`);
  }
  for (const [id, i] of Object.entries(prev))
    if (!(id in cur)) feedEvent('cleared', src, i);
  saveFeed();
}
function feedEvent(kind, src, i, note) {
  feedState.events.unshift({ t: Date.now(), kind, src, cat: i.cat,
    title: i.title, detail: note || i.detail || '', lon: i.lon, lat: i.lat });
  feedState.events = feedState.events.slice(0, 100);
  renderFeed();
}
function saveFeed() {
  localStorage.setItem('copFeedEvents', JSON.stringify(feedState.events));
  localStorage.setItem('copFeedKnown', JSON.stringify(feedState.known));
}
const FEED_KIND = { new: ['NEW', 'var(--green)'], update: ['UPD', 'var(--amber)'],
  cleared: ['CLR', 'var(--dim)'], loiter: ['AIR', 'var(--red)'] };
function renderFeed() {
  const ago = t => { const m = Math.round((Date.now() - t) / 60000);
    return m < 1 ? 'now' : m < 60 ? m + 'm ago' : Math.round(m / 60) + 'h ago'; };
  document.getElementById('feedlist').innerHTML = feedState.events.slice(0, 60)
    .map((e, n) => {
      const c = CAT[e.cat] || CAT.other;
      const [k, kc] = FEED_KIND[e.kind] || ['?', 'var(--dim)'];
      return `<div class="fe ${Date.now() - e.t < 20000 ? 'fresh' : ''}"
        style="border-left-color:${c.col}" data-n="${n}">
        <span>${c.emoji}</span><div>
        <span class="fe-k" style="color:${kc}">${k}</span> ${e.title}<br>
        <span class="fe-m">${e.src}${e.detail ? ' · ' + e.detail : ''} · ${ago(e.t)}</span>
        </div></div>`;
    }).join('');
  document.getElementById('feed-note').textContent =
    feedState.events.length ? `(${feedState.events.length})` : '(watching)';
  document.querySelectorAll('#feedlist .fe').forEach(el => el.onclick = () => {
    const e = feedState.events[+el.dataset.n];
    if (e.lon != null) map.flyTo({ center: [e.lon, e.lat], zoom: 13 });
  });
}

// --- loiter detection: low aircraft circling tight near an active incident ---
const AIR_HIST = {};
function kmDist(lat1, lon1, lat2, lon2) {
  const R = 6371, dLa = (lat2 - lat1) * Math.PI / 180,
    dLo = (lon2 - lon1) * Math.PI / 180;
  const s = Math.sin(dLa / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) * Math.sin(dLo / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
function detectLoiter() {
  const now = Date.now() / 1000;
  const seen = new Set();
  for (const a of state.planes) {
    if (a.alt_baro === 'ground') continue;
    seen.add(a.hex);
    (AIR_HIST[a.hex] = AIR_HIST[a.hex] || []).push([a.lon, a.lat, now]);
    if (AIR_HIST[a.hex].length > 15) AIR_HIST[a.hex].shift();
  }
  for (const hex of Object.keys(AIR_HIST)) // forget aircraft gone > 5 min
    if (!seen.has(hex) && now - AIR_HIST[hex].at(-1)[2] > 300) delete AIR_HIST[hex];
  for (const a of state.planes) {
    const h = AIR_HIST[a.hex];
    if (!h || h.length < 10 || now - h[0][2] < 100) continue; // ≥100 s of track
    const alt = a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0);
    if (!alt || alt > 7000) continue;         // low = working, not transiting
    const cLon = h.reduce((s, p) => s + p[0], 0) / h.length;
    const cLat = h.reduce((s, p) => s + p[1], 0) / h.length;
    if (h.some(p => kmDist(p[1], p[0], cLat, cLon) > 2)) continue; // not tight
    let best = null;
    for (const f of state.esaFeats) {
      const d = kmDist(f.geometry.coordinates[1], f.geometry.coordinates[0],
        a.lat, a.lon);
      if (d < 5 && (!best || d < best.d)) best = { f, d };
    }
    if (!best) continue;
    const key = a.hex + '|' + best.f.properties.guid;
    if (feedState.loiterSeen[key] && now - feedState.loiterSeen[key] < 1800)
      continue; // don't re-alert the same pairing for 30 min
    feedState.loiterSeen[key] = now;
    feedEvent('loiter', 'aircraft', {
      title: `${(a.flight || a.hex).trim()} loitering near ${best.f.properties.suburb}`,
      cat: 'air', lon: a.lon, lat: a.lat,
      detail: `${best.f.properties.title} · ${best.d.toFixed(1)} km · ${alt.toLocaleString()} ft`
    });
    saveFeed();
  }
}

map.on('load', () => {
  map.addImage('plane-lo',  planeIcon('#e0af68'));
  map.addImage('plane-hi',  planeIcon('#7dcfff'));
  map.addImage('plane-mil', planeIcon('#f7768e'));

  for (const cat of ['crash', 'fire', 'burn', 'medical', 'rescue', 'hazmat',
    'storm', 'other'])
    map.addImage('esa-' + cat, incidentIcon(cat));
  // RFS flames carry the official alert-level colour + the white NSW stroke
  map.addImage('rfs-emergency', incidentIcon('fire', '#f7768e', '#c0caf5'));
  map.addImage('rfs-watch',     incidentIcon('fire', '#e0af68', '#c0caf5'));
  map.addImage('rfs-advice',    incidentIcon('fire', '#7dcfff', '#c0caf5'));
  map.addImage('rfs-other',     incidentIcon('fire', '#565f89', '#c0caf5'));

  map.addSource('aircraft', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'aircraft', type: 'symbol', source: 'aircraft',
    layout: {
      'icon-image': ['get', 'icon'],
      'icon-rotate': ['get', 'track'],
      'icon-allow-overlap': true,
      'icon-rotation-alignment': 'map'
    }
  });

  map.on('click', 'aircraft', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>${p.callsign}</b> ${p.mil === 'true' ? '⚠ MIL' : ''}<br>
        type: ${p.type}<br>alt: ${p.alt} ft<br>
        speed: ${p.speed} kt<br>hex: ${p.hex}`)
      .addTo(map);
  });
  map.on('mouseenter', 'aircraft', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'aircraft', () => map.getCanvas().style.cursor = '');

  map.addSource('esa', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'esa', type: 'symbol', source: 'esa',
    layout: { 'icon-image': ['get', 'icon'], 'icon-allow-overlap': true }
  });
  map.on('click', 'esa', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>${p.title}</b><br>
        type: ${(CAT[p.cat] || CAT.other).label}<br>status: ${p.status}<br>
        agency: ${p.agency}<br>suburb: ${p.suburb}<br>updated: ${p.updated}`)
      .addTo(map);
  });
  map.on('mouseenter', 'esa', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'esa', () => map.getCanvas().style.cursor = '');

  map.addSource('fires', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'fires', type: 'circle', source: 'fires',
    paint: {
      // radius scales with fire radiative power (MW): burns ~4, big fires 100+
      'circle-radius': ['interpolate', ['linear'], ['get', 'frp'],
        0, 5, 50, 12, 300, 22],
      'circle-color': '#ff9e64',
      'circle-opacity': 0.5,
      'circle-stroke-width': 2,
      'circle-stroke-color': '#f7768e'
    }
  }, 'esa');
  map.on('click', 'fires', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>satellite hotspot</b><br>detected: ${p.date} ${p.time} UTC<br>
        satellite: ${p.satellite} (${p.daynight === 'D' ? 'day' : 'night'} pass)<br>
        fire power: ${p.frp} MW`)
      .addTo(map);
  });
  map.on('mouseenter', 'fires', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'fires', () => map.getCanvas().style.cursor = '');

  map.addSource('rfs', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'rfs', type: 'symbol', source: 'rfs',
    // flame icon per alert level; white ring = NSW RFS, dark ring = ACT ESA
    layout: {
      'icon-image': ['match', ['get', 'category'],
        'Emergency Warning', 'rfs-emergency', 'Watch and Act', 'rfs-watch',
        'Advice', 'rfs-advice', 'rfs-other'],
      'icon-allow-overlap': true
    }
  });
  map.on('click', 'rfs', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>${p.title}</b> (NSW RFS)<br>alert: ${p.category}<br>
        status: ${p.status}<br>type: ${p.rfstype}<br>size: ${p.size}`)
      .addTo(map);
  });
  map.on('mouseenter', 'rfs', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'rfs', () => map.getCanvas().style.cursor = '');

  // Power outages: hollow dots (dark fill, coloured ring) so they read
  // differently from the solid ESA/RFS incident pins; outage footprint
  // polygons sit under everything as a faint wash.
  const sevColour = ['match', ['get', 'sev'],
    'unplanned', '#f7768e', 'planned-active', '#e0af68', '#565f89'];
  map.addSource('power', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'power-area', type: 'fill', source: 'power',
    filter: ['==', ['geometry-type'], 'Polygon'],
    paint: { 'fill-color': sevColour, 'fill-opacity': 0.15,
      'fill-outline-color': sevColour }
  }, 'esa');
  map.addLayer({
    id: 'power', type: 'circle', source: 'power',
    filter: ['==', ['geometry-type'], 'Point'],
    paint: {
      'circle-radius': 5.5,
      'circle-color': '#1a1b26',
      'circle-opacity': 0.85,
      'circle-stroke-width': 2.5,
      'circle-stroke-color': sevColour
    }
  }, 'esa');
  map.on('click', 'power', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>${p.id}</b> (${p.src})<br>
        ${p.otype} outage${p.sev === 'scheduled' ? ' (scheduled)' : ''}<br>
        customers: ${p.customers}<br>
        ${p.where ? 'where: ' + p.where + '<br>' : ''}
        ${p.reason ? 'reason: ' + p.reason + '<br>' : ''}
        off: ${p.start}<br>est. back: ${p.eta}`)
      .addTo(map);
  });
  map.on('mouseenter', 'power', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'power', () => map.getCanvas().style.cursor = '');

  // Transit: light rail (and buses once the MyWayPlus key lands). Purple to
  // stand apart from every other layer; label rides above each dot.
  map.addSource('transit', { type: 'geojson',
    data: { type: 'FeatureCollection', features: [] } });
  map.addLayer({
    id: 'transit', type: 'circle', source: 'transit',
    paint: {
      'circle-radius': 6,
      'circle-color': ['match', ['get', 'mode'],
        'lightrail', '#bb9af7', '#9ece6a'],
      'circle-opacity': 0.9,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': '#1a1b26'
    }
  });
  map.addLayer({
    id: 'transit-label', type: 'symbol', source: 'transit',
    layout: {
      'text-field': ['coalesce', ['get', 'route'], ['get', 'label'], ''],
      'text-font': ['Open Sans Regular'],
      'text-size': 10,
      'text-offset': [0, -1.4],
      'text-allow-overlap': true
    },
    paint: {
      'text-color': '#bb9af7',
      'text-halo-color': '#1a1b26',
      'text-halo-width': 1.2
    }
  });
  map.on('click', 'transit', e => {
    const p = e.features[0].properties;
    const age = p.ts ? `${Math.max(0, Math.round(Date.now() / 1000 - p.ts))}s ago` : '?';
    const head = p.mode === 'lightrail'
      ? (p.label || 'light rail')
      : (p.route ? 'Route ' + p.route : 'bus');
    new maplibregl.Popup({ offset: 12 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<b>${head}</b> (${p.mode === 'lightrail' ? 'light rail' : 'bus'})<br>
        ${p.label ? 'vehicle: ' + p.label + '<br>' : ''}
        ${p.speed != null ? 'speed: ' + p.speed + ' km/h<br>' : ''}
        ${p.occupancy ? 'occupancy: ' + p.occupancy + '<br>' : ''}
        updated: ${age}`)
      .addTo(map);
  });
  map.on('mouseenter', 'transit', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'transit', () => map.getCanvas().style.cursor = '');

  fetchAircraft();  setInterval(fetchAircraft, 12000);
  fetchRadar();     setInterval(fetchRadar, 5 * 60000);
  fetchWeather();   setInterval(fetchWeather, 10 * 60000);
  fetchIncidents(); setInterval(fetchIncidents, 60000);
  fetchFires();     setInterval(fetchFires, 10 * 60000);
  fetchRfs();       setInterval(fetchRfs, 60000);
  fetchPower();     setInterval(fetchPower, 120000);
  fetchTransit();   setInterval(fetchTransit, 15000);
  fetchNews();      setInterval(fetchNews, 10 * 60000);
  fetchBom();       setInterval(fetchBom, 5 * 60000);
  renderFeed();     setInterval(renderFeed, 60000); // keep the ages fresh
});

function setStatus(ok, text) {
  document.getElementById('dot').className = ok ? 'ok' : 'err';
  document.getElementById('status-text').textContent = text;
}

async function fetchAircraft() {
  try {
    // airplanes.live not adsb.lol: same readsb API shape, but this one sends
    // CORS headers so it works from a plain browser page without a proxy
    const r = await fetch(`https://api.airplanes.live/v2/point/${CBR.lat}/${CBR.lon}/${CBR.radiusNm}`);
    const d = await r.json();
    state.planes = (d.ac || []).filter(a => a.lat != null);
    renderAircraft();
    detectLoiter();
    setStatus(true, `updated ${new Date().toLocaleTimeString()}`);
  } catch (e) { setStatus(false, 'aircraft feed error'); }
}

function renderAircraft() {
  const feats = state.planes.map(a => {
    const mil = ((a.dbFlags || 0) & 1) === 1;
    const alt = a.alt_baro === 'ground' ? 0 : (a.alt_baro || 0);
    return {
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [a.lon, a.lat] },
      properties: {
        icon: mil ? 'plane-mil' : (alt < 10000 ? 'plane-lo' : 'plane-hi'),
        track: a.track || 0,
        callsign: (a.flight || a.hex).trim(),
        type: a.t || '?', alt, speed: Math.round(a.gs || 0),
        hex: a.hex, mil: String(mil)
      }
    };
  });
  map.getSource('aircraft').setData({ type: 'FeatureCollection', features: feats });
  document.getElementById('ac-count').textContent = `(${feats.length})`;

  document.getElementById('aclist').innerHTML = feats
    .sort((x, y) => y.properties.alt - x.properties.alt)
    .map(f => `<div class="ac ${f.properties.mil === 'true' ? 'mil' : ''}"
      data-lon="${f.geometry.coordinates[0]}" data-lat="${f.geometry.coordinates[1]}">
      <span>${f.properties.callsign}</span><span>${f.properties.type}</span>
      <span>${f.properties.alt.toLocaleString()} ft</span></div>`).join('');
  document.querySelectorAll('#aclist .ac').forEach(el =>
    el.onclick = () => map.flyTo({ center: [+el.dataset.lon, +el.dataset.lat], zoom: 11 }));
}

async function fetchRadar() {
  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const d = await r.json();
    const frame = d.radar.past.at(-1);
    const tiles = [`${d.host}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`];
    if (map.getSource('radar')) {
      map.removeLayer('radar'); map.removeSource('radar');
    }
    // RainViewer free tiles top out at z7 (placeholder images above that);
    // maxzoom makes MapLibre overscale z7 instead of fetching the placeholders
    map.addSource('radar', { type: 'raster', tiles, tileSize: 256, maxzoom: 7 });
    map.addLayer({ id: 'radar', type: 'raster', source: 'radar',
      paint: { 'raster-opacity': 0.55 } }, 'aircraft');
    map.setLayoutProperty('radar', 'visibility',
      document.getElementById('tog-radar').checked ? 'visible' : 'none');
  } catch (e) { /* radar is decorative in the PoC; fail quietly */ }
}

async function fetchWeather() {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${CBR.lat}&longitude=${CBR.lon}` +
      '&current=temperature_2m,apparent_temperature,precipitation,weather_code,' +
      'wind_speed_10m,wind_direction_10m,wind_gusts_10m&timezone=Australia%2FSydney');
    const c = (await r.json()).current;
    const dir = ['N','NE','E','SE','S','SW','W','NW'][Math.round(c.wind_direction_10m / 45) % 8];
    document.getElementById('wx-temp').textContent =
      `${c.temperature_2m}°C / ${c.apparent_temperature}°C`;
    document.getElementById('wx-wind').textContent =
      `${dir} ${c.wind_speed_10m} km/h (g ${c.wind_gusts_10m})`;
    document.getElementById('wx-cond').textContent =
      `${WMO[c.weather_code] || 'code ' + c.weather_code}` +
      (c.precipitation > 0 ? `, ${c.precipitation} mm` : '');
  } catch (e) { document.getElementById('wx-cond').textContent = 'wx error'; }
}

async function fetchIncidents() {
  const count = document.getElementById('esa-count');
  try {
    // relative path → serve.py relay; upstream ESA feed sends no CORS headers
    const r = await fetch('esa');
    if (!r.ok) throw new Error(r.status);
    const list = await r.json();
    const feats = list
      .filter(i => i.state === 'ACT' && i.point && i.point.coordinates)
      .map(i => {
        // description is an HTML blob of "Key: Value<br />" pairs — explode it
        const kv = {};
        i.description.split(/<br\s*\/?>/).forEach(line => {
          const m = line.match(/^\s*([\w ]+):\s*(.+)$/s);
          if (m) kv[m[1].trim().toLowerCase()] = m[2].trim();
        });
        // feed ships [lat, lon] as strings; GeoJSON wants numeric [lon, lat]
        const [lat, lon] = i.point.coordinates.map(Number);
        const cat = categorise(i.title);
        return {
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lon, lat] },
          properties: {
            title: i.title, agency: kv.agency || '?',
            status: kv.status || '?', suburb: kv.suburb || '?',
            updated: kv.updated || '?',
            guid: i.guid || i.title, cat, icon: 'esa-' + cat
          }
        };
      });
    map.getSource('esa').setData({ type: 'FeatureCollection', features: feats });
    count.textContent = `(${feats.length})`;
    state.esaFeats = feats;
    feedDiff('ACT ESA', feats.map(f => ({
      id: f.properties.guid, title: f.properties.title,
      status: f.properties.status, cat: f.properties.cat,
      detail: f.properties.suburb,
      lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
  } catch (e) {
    count.textContent = '(needs serve.py)';
  }
}

// Address search: geocode via serve.py (Nominatim relay), then fly to the
// pick and drop a marker. Enter submits; results list is clickable.
let searchMarker = null;
const addrInput = document.getElementById('addr-search');
const addrResults = document.getElementById('addr-results');
addrInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const q = addrInput.value.trim();
  if (!q) return;
  addrResults.innerHTML = '<div class="sr-msg">searching…</div>';
  try {
    const r = await fetch('geocode?q=' + encodeURIComponent(q));
    if (!r.ok) throw new Error(r.status);
    const hits = await r.json();
    if (!hits.length) {
      addrResults.innerHTML = '<div class="sr-msg">no matches near Canberra</div>';
      return;
    }
    addrResults.innerHTML = hits.map((h, i) =>
      `<div class="sr" data-i="${i}">${h.name}</div>`).join('');
    addrResults.querySelectorAll('.sr').forEach(el =>
      el.onclick = () => pickAddress(hits[+el.dataset.i]));
  } catch (err) {
    addrResults.innerHTML = '<div class="sr-msg">search unavailable (needs serve.py)</div>';
  }
});
function pickAddress(h) {
  if (searchMarker) searchMarker.remove();
  searchMarker = new maplibregl.Marker({ color: '#7dcfff' })
    .setLngLat([h.lon, h.lat])
    .setPopup(new maplibregl.Popup({ offset: 24 }).setHTML(`📍 ${h.name}`))
    .addTo(map);
  searchMarker.togglePopup();
  map.flyTo({ center: [h.lon, h.lat], zoom: 15 });
  addrResults.innerHTML = '';
}

document.getElementById('tog-transit').onchange = e => {
  for (const id of ['transit', 'transit-label'])
    map.setLayoutProperty(id, 'visibility', e.target.checked ? 'visible' : 'none');
};

async function fetchFires() {
  const count = document.getElementById('fires-count');
  try {
    const r = await fetch('firms');
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    map.getSource('fires').setData(geo);
    count.textContent = `(${geo.features.length})`;
  } catch (e) {
    count.textContent = '(needs serve.py)';
  }
}

async function fetchRfs() {
  const count = document.getElementById('rfs-count');
  try {
    const r = await fetch('rfs');
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    const feats = geo.features
      .map(f => {
        // big fires ship a GeometryCollection (point + burnt-area polygon);
        // keep just the point for pin display
        const g = f.geometry.type === 'GeometryCollection'
          ? f.geometry.geometries.find(g => g.type === 'Point')
          : (f.geometry.type === 'Point' ? f.geometry : null);
        if (!g) return null;
        const kv = {};
        (f.properties.description || '').split(/<br\s*\/?>/).forEach(line => {
          const m = line.match(/^\s*([\w ]+):\s*(.+)$/s);
          if (m) kv[m[1].trim().toLowerCase()] = m[2].trim();
        });
        return {
          type: 'Feature', geometry: g,
          properties: {
            title: f.properties.title, category: f.properties.category,
            status: kv.status || '?', rfstype: kv.type || '?',
            size: kv.size || '?'
          }
        };
      })
      .filter(f => f && f.geometry.coordinates[0] > 148.2 &&
        f.geometry.coordinates[0] < 150.5 &&
        f.geometry.coordinates[1] > -36.5 && f.geometry.coordinates[1] < -34.2);
    map.getSource('rfs').setData({ type: 'FeatureCollection', features: feats });
    count.textContent = `(${feats.length})`;
    feedDiff('NSW RFS', feats.map(f => ({
      id: f.properties.title, title: f.properties.title,
      status: f.properties.status, cat: 'fire',
      detail: f.properties.category,
      lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
  } catch (e) {
    count.textContent = '(needs serve.py)';
  }
}

async function fetchPower() {
  const count = document.getElementById('power-count');
  try {
    const r = await fetch('power');
    if (!r.ok) throw new Error(r.status);
    const geo = await r.json();
    map.getSource('power').setData(geo);
    // one pin per outage (polygons are duplicates of the same outage)
    const pins = geo.features.filter(f => f.geometry.type === 'Point');
    const live = pins.filter(f => f.properties.sev !== 'scheduled').length;
    count.textContent = `(${live} live / ${pins.length - live} sched)`;
    // scheduled works stay out of the feed — only live outages are events
    feedDiff('power', pins.filter(f => f.properties.sev !== 'scheduled')
      .map(f => ({
        id: String(f.properties.id),
        title: `${f.properties.otype || 'power'} outage — ` +
          String(f.properties.where || f.properties.id).slice(0, 40),
        status: f.properties.sev + '|' + (f.properties.eta || ''),
        cat: 'power', detail: `${f.properties.customers ?? '?'} customers`,
        lon: f.geometry.coordinates[0], lat: f.geometry.coordinates[1] })));
  } catch (e) {
    count.textContent = '(needs serve.py)';
  }
}

async function fetchBom() {
  const box = document.getElementById('bomwarn');
  try {
    const r = await fetch('bom');
    if (!r.ok) throw new Error(r.status);
    const warns = await r.json();
    // severity order so the worst sits on top
    const rank = { major: 0, moderate: 1, minor: 2 };
    warns.sort((a, b) => (rank[a.severity] ?? 3) - (rank[b.severity] ?? 3));
    box.className = warns.length ? 'has-warn' : '';
    box.innerHTML = warns.map(w => {
      const t = w.expires ? new Date(w.expires) : null;
      const till = t ? `until ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}` : '';
      return `<div class="bw ${w.severity || ''}" data-id="${w.id}">
        <span class="bt">⚠ ${w.short || w.title}</span>
        <span class="bm">${w.title !== w.short ? w.title + ' · ' : ''}${till}</span>
        <div class="bd"></div>
      </div>`;
    }).join('');
    box.querySelectorAll('.bw').forEach(el => el.onclick = () => toggleBom(el));
  } catch (e) {
    box.className = '';
    box.innerHTML = '';
  }
}

// Expand a warning to its full BOM text, lazy-loaded on first open.
async function toggleBom(el) {
  const bd = el.querySelector('.bd');
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  el.classList.add('open');
  if (bd.dataset.loaded) return;
  bd.innerHTML = '<span class="bm">loading…</span>';
  try {
    const r = await fetch('bomdetail?id=' + encodeURIComponent(el.dataset.id));
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    bd.innerHTML = d.message || '<span class="bm">no detail available</span>';
    bd.dataset.loaded = '1';
  } catch (e) {
    bd.innerHTML = '<span class="bm">detail unavailable</span>';
  }
}

async function fetchNews() {
  const note = document.getElementById('news-note');
  try {
    const r = await fetch('news');
    if (!r.ok) throw new Error(r.status);
    const items = await r.json();
    const ago = ts => {
      const m = Math.round((Date.now() / 1000 - ts) / 60);
      return m < 60 ? `${m}m` : `${Math.round(m / 60)}h`;
    };
    document.getElementById('newslist').innerHTML = items.map(i =>
      `<a href="${i.link}" target="_blank" rel="noopener">${i.title}
       <span class="src">— ${i.source}, ${ago(i.ts)} ago</span></a>`).join('');
    note.textContent = '';
  } catch (e) { note.textContent = '(needs serve.py)'; }
}

// Traffic tiles cost API quota, so the layer is off by default and only
// created on first toggle. Key stays in serve.py; page never sees it.
document.getElementById('tog-traffic').onchange = async e => {
  const note = document.getElementById('traffic-note');
  if (!map.getSource('traffic')) {
    try {
      const probe = await fetch('tomtom/9/468/314.png');
      if (!probe.ok) throw new Error(probe.status);
      map.addSource('traffic', { type: 'raster',
        tiles: [`${location.origin}/tomtom/{z}/{x}/{y}.png`],
        tileSize: 256, minzoom: 6, maxzoom: 16 });
      map.addLayer({ id: 'traffic', type: 'raster', source: 'traffic',
        paint: { 'raster-opacity': 0.8 } }, 'aircraft');
      note.textContent = '';
    } catch (err) {
      note.textContent = '(needs serve.py + key)';
      e.target.checked = false;
      return;
    }
  }
  map.setLayoutProperty('traffic', 'visibility',
    e.target.checked ? 'visible' : 'none');
};
