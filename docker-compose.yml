# Runs the COP on a homelab box. App files + .env are volume-mounted,
# so a git pull / rsync of new code only needs a container restart.
services:
  canberra-cop:
    image: python:3.14-alpine
    container_name: canberra-cop
    working_dir: /app
    volumes:
      - ./app:/app:ro
    command: python3 serve.py
    ports:
      - "8899:8899"
    restart: unless-stopped
